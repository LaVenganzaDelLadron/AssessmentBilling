<div class="p-6">
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Enrollments</h1>
      <p class="mt-1 text-sm text-gray-500">Manage student enrollments across classes and years</p>
    </div>
    <button class="rounded-xl bg-indigo-600 px-6 py-2.5 font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
      Add Enrollment
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200">
    <div class="p-6 border-b border-gray-200">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="relative">
            <input type="text" placeholder="Search by student_id or class_id..." class="w-full rounded-lg border border-gray-200 px-4 py-2 pl-11 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
        </div>
        <div class="flex flex-wrap gap-2">
          <select class="rounded-lg border border-gray-200 px-4 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            <option>All Year Levels</option>
            <option>2024-2025</option>
            <option>2023-2024</option>
          </select>
          <select class="rounded-lg border border-gray-200 px-4 py-2 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            <option>All Classes</option>
            <option>Grade 1</option>
            <option>Grade 2</option>
          </select>
        </div>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Student ID</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Class ID</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Year ID</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created At</th>
            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
            <th class="px-6 py-4 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr>
            <td class="px-6 py-4 text-sm font-medium text-gray-900">STD001</td>
            <td class="px-6 py-4 text-sm text-gray-900">CLS101</td>
            <td class="px-6 py-4 text-sm text-gray-900">YR2024</td>
            <td class="px-6 py-4 text-sm text-gray-900">2024-04-01</td>
            <td class="px-6 py-4">
              <span class="inline-flex rounded-full bg-green-100 px-2 py-1 text-xs font-semibold text-green-800">Active</span>
            </td>
            <td class="px-6 py-4 text-right text-sm font-medium">
              <button class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
              <button class="text-red-600 hover:text-red-900">Delete</button>
            </td>
          </tr>
          <tr>
            <td class="px-6 py-4 text-sm font-medium text-gray-900">STD002</td>
            <td class="px-6 py-4 text-sm text-gray-900">CLS102</td>
            <td class="px-6 py-4 text-sm text-gray-900">YR2023</td>
            <td class="px-6 py-4 text-sm text-gray-900">2024-03-15</td>
            <td class="px-6 py-4">
              <span class="inline-flex rounded-full bg-yellow-100 px-2 py-1 text-xs font-semibold text-yellow-800">Pending</span>
            </td>
            <td class="px-6 py-4 text-right text-sm font-medium">
              <button class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
              <button class="text-red-600 hover:text-red-900">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="p-6 bg-gray-50 border-t border-gray-200">
      <div class="flex items-center justify-between">
        <div class="text-sm text-gray-700">
          Showing <span class="font-medium">1 to 2</span> of <span class="font-medium">12</span> results
        </div>
        <div class="flex space-x-1">
          <button class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-100">1</button>
          <button class="w-10 h-10 rounded-lg bg-indigo-600 text-white flex items-center justify-center">2</button>
        </div>
      </div>
    </div>
  </div>
</div>
