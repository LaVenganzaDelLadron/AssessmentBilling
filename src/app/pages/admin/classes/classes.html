<div class="p-6">
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Programs</h1>
      <p class="mt-1 text-sm text-gray-500">Manage class sections and descriptions</p>
    </div>
    <div class="flex flex-col sm:flex-row gap-3">
      <div class="flex">
        <div class="relative">
          <input type="text" placeholder="Search classes..." class="rounded-l-lg border border-gray-200 px-4 py-2 pl-11 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 w-64">
          <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
      </div>
      <button class="rounded-xl bg-indigo-600 px-6 py-2.5 font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        Create Class
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">
    <div class="lg:col-span-1">
      <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">Class Summary</h3>
        <div class="space-y-4">
          <div>
            <p class="text-2xl font-bold text-indigo-600">24</p>
            <p class="text-sm text-gray-500">Total Classes</p>
          </div>
          <div>
            <p class="text-2xl font-bold text-green-600">20</p>
            <p class="text-sm text-gray-500">Active Classes</p>
          </div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-2">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6 border-b border-gray-200">
          <div class="flex items-center">
            <select class="rounded-lg border border-gray-200 px-4 py-2 text-sm mr-3 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
              <option>All Schools</option>
              <option>Central High School</option>
              <option>West Academy</option>
            </select>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">School ID</th>
                <th class="px-6 py-4 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
              <tr>
                <td class="px-6 py-4 text-sm font-medium text-gray-900">CLS001</td>
                <td class="px-6 py-4 text-sm font-medium text-gray-900">Grade 1 - Section A</td>
                <td class="px-6 py-4 text-sm text-gray-900">Basic Mathematics and English</td>
                <td class="px-6 py-4">
                  <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">SCH001</span>
                </td>
                <td class="px-6 py-4 text-right text-sm font-medium">
                  <button class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
                  <button class="text-red-600 hover:text-red-900">Delete</button>
                </td>
              </tr>
              <tr>
                <td class="px-6 py-4 text-sm font-medium text-gray-900">CLS002</td>
                <td class="px-6 py-4 text-sm font-medium text-gray-900">Grade 2 - Section B</td>
                <td class="px-6 py-4 text-sm text-gray-900">Science and Social Studies</td>
                <td class="px-6 py-4">
                  <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">SCH001</span>
                </td>
                <td class="px-6 py-4 text-right text-sm font-medium">
                  <button class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
                  <button class="text-red-600 hover:text-red-900">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="p-6 bg-gray-50 border-t border-gray-200">
          <div class="flex items-center justify-between">
            <div class="text-sm text-gray-700">
              Showing <span class="font-medium">1 to 2</span> of <span class="font-medium">24</span> classes
            </div>
            <div class="flex space-x-1">
              <button class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-100">1</button>
              <button class="w-10 h-10 rounded-lg bg-indigo-600 text-white flex items-center justify-center">2</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
