<div class="p-6">
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Programs</h1>
      <p class="mt-1 text-sm text-gray-500">Academic program catalog from Laravel API</p>
    </div>
    <button
      type="button"
      class="rounded-xl border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"
      (click)="loadPrograms()"
      [disabled]="isLoading"
    >
      Refresh
    </button>
  </div>

  <div *ngIf="isLoading" class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
    <p class="text-sm text-gray-600">Loading programs...</p>
  </div>

  <div *ngIf="!isLoading && errorMessage" class="rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700">
    {{ errorMessage }}
    <button
      type="button"
      class="ml-2 font-semibold underline"
      (click)="loadPrograms()"
    >
      Retry
    </button>
  </div>

  <div *ngIf="!isLoading && !errorMessage" class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Code</th>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Name</th>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Department</th>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Status</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 bg-white">
          <tr *ngFor="let program of programs; trackBy: trackByProgramId">
            <td class="whitespace-nowrap px-6 py-4 text-sm font-semibold text-gray-900">{{ program.code }}</td>
            <td class="px-6 py-4 text-sm text-gray-800">{{ program.name }}</td>
            <td class="px-6 py-4 text-sm text-gray-800">{{ program.department }}</td>
            <td class="px-6 py-4 text-sm">
              <span
                class="inline-flex items-center rounded-full px-2 py-1 text-xs font-semibold ring-1 ring-inset"
                [ngClass]="badgeClass(program.status)"
              >
                {{ program.status | titlecase }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="programs.length === 0" class="border-t border-gray-200 px-6 py-8 text-center text-sm text-gray-500">
      No programs found.
    </div>
  </div>
</div>
