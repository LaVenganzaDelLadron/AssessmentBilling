<div class="p-6">
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Fees Management</h1>
      <p class="mt-1 text-sm text-gray-500">Fee records from the backend API</p>
    </div>
    <div class="flex gap-3">
      <button
        type="button"
        class="rounded-xl border border-gray-300 px-6 py-2.5 font-medium text-gray-700 shadow-sm hover:bg-gray-50"
        (click)="toggleAddForm()"
      >
        {{ showAddForm ? 'Cancel' : 'Add Fee' }}
      </button>
      <button
        type="button"
        class="rounded-xl bg-indigo-600 px-6 py-2.5 font-medium text-white shadow-sm hover:bg-indigo-700"
        [disabled]="isLoading"
        (click)="loadFees()"
      >
        Refresh
      </button>
    </div>
  </div>

  <div *ngIf="showAddForm" class="mb-6 rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
    <h2 class="mb-4 text-lg font-semibold text-gray-900">Add Fee</h2>
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <div>
        <label class="mb-2 block text-sm font-medium text-gray-700">Fee Name</label>
        <input
          type="text"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
          [(ngModel)]="form.name"
          placeholder="Tuition Fee"
        />
      </div>
      <div>
        <label class="mb-2 block text-sm font-medium text-gray-700">Amount</label>
        <input
          type="number"
          min="0"
          step="0.01"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
          [(ngModel)]="form.amount"
          placeholder="12000"
        />
      </div>
    </div>

    <div class="mt-4">
      <button
        type="button"
        class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"
        [disabled]="isSubmitting"
        (click)="submitFee()"
      >
        {{ isSubmitting ? 'Saving...' : 'Save Fee' }}
      </button>
    </div>
  </div>

  <div class="mb-6 grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
      <p class="text-sm text-gray-500">Total Fees</p>
      <p class="mt-2 text-2xl font-bold text-gray-900">{{ fees.length }}</p>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
      <p class="text-sm text-gray-500">Total Amount</p>
      <p class="mt-2 text-2xl font-bold text-gray-900">{{ totalAmount | number:'1.2-2' }}</p>
    </div>
  </div>

  <div *ngIf="successMessage" class="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 p-4 text-sm text-emerald-700">
    {{ successMessage }}
  </div>

  <div *ngIf="isLoading" class="rounded-xl border border-gray-200 bg-white p-6 text-sm text-gray-600 shadow-sm">
    Loading fees...
  </div>

  <div *ngIf="!isLoading && errorMessage" class="rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage" class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Fee ID</th>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Name</th>
            <th class="px-6 py-3 text-right text-xs font-semibold uppercase tracking-wider text-gray-500">Amount</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 bg-white">
          <tr *ngFor="let fee of fees; trackBy: trackByFeeId">
            <td class="whitespace-nowrap px-6 py-4 text-sm font-medium text-gray-900">{{ fee.id }}</td>
            <td class="px-6 py-4 text-sm text-gray-800">{{ fee.name }}</td>
            <td class="px-6 py-4 text-right text-sm font-semibold text-gray-900">{{ fee.amount | number:'1.2-2' }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="fees.length === 0" class="border-t border-gray-200 px-6 py-8 text-center text-sm text-gray-500">
      No fee records found.
    </div>
  </div>
</div>
