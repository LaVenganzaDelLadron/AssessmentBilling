<div class="p-6">
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Teachers</h1>
      <p class="mt-1 text-sm text-gray-500">Admin view of users with teacher role</p>
    </div>
    <button
      type="button"
      class="rounded-xl bg-indigo-600 px-6 py-2.5 font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      (click)="loadTeachers()"
      [disabled]="isLoading"
    >
      Refresh
    </button>
  </div>

  <div *ngIf="isLoading" class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
    <p class="text-sm text-gray-600">Loading teachers...</p>
  </div>

  <div *ngIf="!isLoading && errorMessage" class="rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700">
    {{ errorMessage }}
    <button
      type="button"
      class="ml-2 font-semibold underline"
      (click)="loadTeachers()"
    >
      Retry
    </button>
  </div>

  <div *ngIf="!isLoading && !errorMessage" class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <div class="border-b border-gray-200 p-4 text-sm text-gray-600">
      Total teachers: <span class="font-semibold">{{ teachers.length }}</span>
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">User ID</th>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Name</th>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Email</th>
            <th class="px-6 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500">Role</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 bg-white">
          <tr *ngFor="let teacher of teachers; trackBy: trackByTeacherId">
            <td class="whitespace-nowrap px-6 py-4 text-sm font-medium text-gray-900">{{ teacher.id }}</td>
            <td class="px-6 py-4 text-sm text-gray-800">{{ teacher.name }}</td>
            <td class="px-6 py-4 text-sm text-gray-800">{{ teacher.email }}</td>
            <td class="px-6 py-4 text-sm">
              <span class="inline-flex rounded-full bg-emerald-100 px-2 py-1 text-xs font-semibold text-emerald-700">
                {{ teacher.role | titlecase }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="teachers.length === 0" class="border-t border-gray-200 px-6 py-8 text-center text-sm text-gray-500">
      No teacher users found.
    </div>
  </div>
</div>
