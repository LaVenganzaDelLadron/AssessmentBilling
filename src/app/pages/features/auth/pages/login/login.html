<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 selection:bg-purple-100">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[10%] -right-[5%] h-64 w-64 rounded-full bg-purple-200/30 blur-3xl"></div>
    <div class="absolute bottom-[5%] left-[5%] h-80 w-80 rounded-full bg-indigo-200/20 blur-3xl"></div>
  </div>

  <div class="relative z-10 max-w-md w-full mx-auto">
    <div class="text-center mb-10">
      <div class="mx-auto h-14 w-14 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-purple-200 rotate-3 hover:rotate-0 transition-transform duration-300">
        <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="mt-8 text-3xl font-extrabold tracking-tight text-slate-900">Welcome back</h2>
      <p class="mt-3 text-slate-500 font-medium">
        New to EduBill?
        <a href="#" class="text-purple-600 hover:text-purple-700 underline underline-offset-4 decoration-purple-200 hover:decoration-purple-600 transition-all ml-1">Create an account</a>
      </p>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100">
      <form (ngSubmit)="onSubmit()" #loginNgForm="ngForm" class="space-y-5">

        <div class="space-y-1.5">
          <label for="identifier" class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1">Login Credentials</label>
          <div class="relative group">
            <input
              id="identifier"
              name="identifier"
              type="text"
              [(ngModel)]="loginForm.identifier"
              required
              class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-600/20 focus:border-purple-600 focus:bg-white transition-all sm:text-sm"
              placeholder="Email or Student ID">
          </div>
        </div>

        <div class="space-y-1.5">
          <div class="flex justify-between items-center px-1">
            <label for="password" class="text-xs font-bold uppercase tracking-wider text-slate-500">Password</label>
          </div>
          <div class="relative">
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="loginForm.password"
              required
              class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-600/20 focus:border-purple-600 focus:bg-white transition-all sm:text-sm"
              placeholder="••••••••">
          </div>
        </div>

        <div class="flex items-center px-1 py-1">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-slate-300 rounded">
          <label for="remember-me" class="ml-2 block text-sm text-slate-600">Remember this device</label>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            class="w-full flex justify-center items-center py-4 px-4 border border-transparent text-sm font-bold rounded-2xl text-white bg-slate-900 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-600 shadow-lg shadow-purple-100 transition-all active:scale-[0.98]">
            Sign in to Dashboard
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-50 text-center">
        <p class="text-xs text-slate-400">
          Secure login encrypted with 256-bit SSL. <br/>
          Having trouble? <a href="#" class="underline">Contact Support</a>
        </p>
      </div>
    </div>
  </div>
</div>
