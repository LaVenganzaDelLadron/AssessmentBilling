<section class="min-h-screen bg-[#FAFBFF] text-slate-900 selection:bg-indigo-100 selection:text-indigo-900">
  <nav class="sticky top-0 z-50 border-b border-slate-200/40 bg-white/70 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-600 to-violet-700 shadow-lg shadow-indigo-200">
          <span class="text-lg font-bold text-white tracking-tighter">AB</span>
        </div>
        <a routerLink="/" class="group text-xl font-bold tracking-tight text-slate-900">
          Assessment <span class="text-indigo-600 transition-colors group-hover:text-violet-600">Billing</span>
        </a>
      </div>

      <div class="flex items-center gap-5">
        <div class="hidden md:flex items-center gap-8 text-sm font-semibold text-slate-600">
          <a href="#features" class="hover:text-indigo-600 transition-colors">Features</a>
        </div>
        <a routerLink="/login" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors">
          Login
        </a>
        <a routerLink="/signup">
          <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-all hover:shadow-lg hover:shadow-emerald-200/50 active:scale-95">
            Get Started Free
          </button>
        </a>
      </div>
    </div>
  </nav>

  <div class="relative overflow-hidden">
    <div class="pointer-events-none absolute -top-[10%] -left-[10%] h-[500px] w-[500px] rounded-full bg-indigo-200/30 blur-[120px]"></div>
    <div class="pointer-events-none absolute top-[20%] -right-[5%] h-[400px] w-[400px] rounded-full bg-emerald-100/40 blur-[100px]"></div>

    <div class="relative mx-auto grid max-w-7xl gap-16 px-6 py-20 lg:grid-cols-2 lg:items-center lg:px-8 lg:py-32">
      <div class="max-w-2xl text-center lg:text-left">
        <span class="mb-6 inline-flex items-center rounded-full bg-indigo-50 px-4 py-1.5 text-xs font-bold uppercase tracking-wider text-indigo-700 ring-1 ring-inset ring-indigo-200">
          The Future of Ed-Tech
        </span>
        <h1 class="text-5xl font-[900] leading-[1.05] tracking-tight text-slate-900 sm:text-7xl">
          School management <br />
          <span class="bg-gradient-to-r from-indigo-600 via-violet-600 to-emerald-500 bg-clip-text text-transparent">reimagined.</span>
        </h1>
        <p class="mt-8 text-xl leading-relaxed text-slate-500 md:px-0 px-4">
          Automate billing cycles, track student growth, and scale your institution with a platform built for clarity and speed.
        </p>
      </div>

      <div class="hidden lg:block relative scale-110">
        <div class="relative flex items-center justify-center">
          <div class="absolute h-[120%] w-[120%] bg-indigo-500/5 blur-[100px] rounded-full"></div>

          <div class="absolute -top-12 -right-8 z-30 animate-bounce [animation-duration:6s] w-64 rounded-2xl bg-white p-4 shadow-2xl ring-1 ring-slate-100">
            <div class="flex items-center gap-4">
              <div class="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              </div>
              <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Fee Paid</p>
                <p class="text-lg font-bold text-slate-900">$1,250.00</p>
              </div>
            </div>
          </div>

          <div class="relative z-20 w-full max-w-[380px] transform rounded-[2.5rem] bg-white p-10 shadow-[0_50px_100px_-20px_rgba(0,0,0,0.15)] ring-1 ring-slate-200/60">
            <div class="flex items-center justify-between mb-8">
              <h3 class="font-bold text-slate-900">Student Progress</h3>
              <span class="rounded-lg bg-emerald-50 px-2.5 py-1 text-[10px] font-black text-emerald-600 tracking-tighter">ENROLLED</span>
            </div>
            <div class="space-y-6">
              <div class="h-3 w-full rounded-full bg-slate-50 overflow-hidden"><div class="h-full w-[85%] bg-indigo-500"></div></div>
              <div class="h-3 w-full rounded-full bg-slate-50 overflow-hidden"><div class="h-full w-[65%] bg-violet-500"></div></div>
              <div class="h-3 w-full rounded-full bg-slate-50 overflow-hidden"><div class="h-full w-[92%] bg-emerald-500"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section id="features" class="relative z-10 bg-white py-24 lg:py-32 border-t border-slate-50">
    <div class="mx-auto w-full max-w-7xl px-6 lg:px-8">
      <div class="mb-20 text-center">
        <h2 class="text-sm font-bold uppercase tracking-[0.3em] text-emerald-600">Core Features</h2>
        <p class="mt-4 text-4xl font-[900] tracking-tight text-slate-900 sm:text-5xl">Everything in one place</p>
      </div>

      <div class="mt-10 grid gap-10 sm:grid-cols-2 lg:grid-cols-4">
        <div class="group relative p-1 rounded-[2.5rem] transition-all duration-500 hover:bg-gradient-to-b hover:from-indigo-400 hover:to-transparent">
          <div class="h-full w-full rounded-[2.4rem] bg-white p-3 transition-all group-hover:bg-white/95 group-hover:shadow-2xl">
            <app-ui-card
              class="h-full border-none shadow-none"
              [title]="'Smart Assessment'"
              [subtitle]="'Intuitive grading tools that turn scores into real insights.'">
            </app-ui-card>
          </div>
        </div>

        <div class="group relative p-1 rounded-[2.5rem] transition-all duration-500 hover:bg-gradient-to-b hover:from-emerald-400 hover:to-transparent">
          <div class="h-full w-full rounded-[2.4rem] bg-white p-3 transition-all group-hover:bg-white/95 group-hover:shadow-2xl">
            <app-ui-card
              class="h-full border-none shadow-none"
              [title]="'Automated Billing'"
              [subtitle]="'Recurring invoices and payment tracking handled for you.'">
            </app-ui-card>
          </div>
        </div>

        <div class="group relative p-1 rounded-[2.5rem] transition-all duration-500 hover:bg-gradient-to-b hover:from-indigo-400 hover:to-transparent">
          <div class="h-full w-full rounded-[2.4rem] bg-white p-3 transition-all group-hover:bg-white/95 group-hover:shadow-2xl">
            <app-ui-card
              class="h-full border-none shadow-none"
              [title]="'Real-time Stats'"
              [subtitle]="'Monitor school finances and performance as it happens.'">
            </app-ui-card>
          </div>
        </div>

        <div class="group relative p-1 rounded-[2.5rem] transition-all duration-500 hover:bg-gradient-to-b hover:from-emerald-400 hover:to-transparent">
          <div class="h-full w-full rounded-[2.4rem] bg-white p-3 transition-all group-hover:bg-white/95 group-hover:shadow-2xl">
            <app-ui-card
              class="h-full border-none shadow-none"
              [title]="'Secure Access'"
              [subtitle]="'Role-specific logins for teachers, students, and admins.'">
            </app-ui-card>
          </div>
        </div>
      </div>
    </div>
  </section>
</section>
