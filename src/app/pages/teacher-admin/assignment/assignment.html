<section class="space-y-6">
  <app-ui-card [title]="'Create New Assignment'" [subtitle]="'Publish tasks for your students'">
    <form class="grid gap-4 md:grid-cols-2">
      <input type="text" class="rounded-xl border border-gray-300 px-4 py-3 text-sm focus:border-indigo-500 focus:outline-none" placeholder="Assignment title">
      <select class="rounded-xl border border-gray-300 px-4 py-3 text-sm focus:border-indigo-500 focus:outline-none">
        <option>Mathematics</option>
        <option>Science</option>
      </select>
      <textarea rows="4" class="md:col-span-2 rounded-xl border border-gray-300 px-4 py-3 text-sm focus:border-indigo-500 focus:outline-none" placeholder="Assignment details..."></textarea>
      <input type="date" class="rounded-xl border border-gray-300 px-4 py-3 text-sm focus:border-indigo-500 focus:outline-none">
      <input type="number" class="rounded-xl border border-gray-300 px-4 py-3 text-sm focus:border-indigo-500 focus:outline-none" placeholder="Max points">
      <div class="md:col-span-2">
        <app-ui-button [label]="'Create Assignment'" [fullWidth]="true"></app-ui-button>
      </div>
    </form>
  </app-ui-card>

  <app-ui-card [title]="'Active Assignments'">
    <div class="space-y-3">
      <div class="flex flex-wrap items-center justify-between gap-3 rounded-xl bg-gray-50 p-4">
        <div>
          <p class="font-medium text-gray-900">Math Assignment #5</p>
          <p class="text-sm text-gray-500">Due: 2026-05-10 • 25 submissions</p>
        </div>
        <div class="flex items-center gap-2">
          <span class="rounded-full bg-yellow-100 px-3 py-1 text-xs font-medium text-yellow-700">Open</span>
          <app-ui-button [label]="'Grade'" [variant]="'secondary'"></app-ui-button>
        </div>
      </div>
    </div>
  </app-ui-card>
</section>
