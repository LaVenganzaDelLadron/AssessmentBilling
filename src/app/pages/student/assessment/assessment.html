<section class="space-y-6">
  <app-ui-card [title]="'Assessment Overview'" [subtitle]="'Current assessment summary'">
    <div class="grid gap-4 md:grid-cols-3">
      <app-ui-card [title]="'Tuition Fee'" [value]="'$2,500'" [subtitle]="'Annual tuition'"></app-ui-card>
      <app-ui-card [title]="'Misc Fee'" [value]="'$450'" [subtitle]="'Miscellaneous charges'"></app-ui-card>
      <app-ui-card [title]="'Laboratory Fee'" [value]="'$350'" [subtitle]="'Lab usage'"></app-ui-card>
    </div>
    <div class="mt-4 flex flex-wrap items-center justify-between gap-3 rounded-xl bg-indigo-50 p-4">
      <p class="text-sm font-medium text-indigo-700">Total Amount: <span class="text-lg font-semibold">$3,300</span></p>
      <app-ui-button [label]="'Download Assessment'"></app-ui-button>
    </div>
  </app-ui-card>

  <app-ui-card [title]="'Fee Breakdown'">
    <app-ui-table [columns]="feeColumns" [rows]="feeRows"></app-ui-table>
  </app-ui-card>
</section>
