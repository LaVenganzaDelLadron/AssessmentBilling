<div class="p-6">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Submissions</h1>
    <p class="text-gray-600 mb-8">Your recent assignment submissions and grades.</p>
  </div>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Submission Cards -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-4">

        <span class="px-3 py-1 text-xs font-medium rounded-full bg-purple-100 text-purple-800">Pending Review</span>
      </div>
      <div class="space-y-2 mb-6">
        <div class="flex justify-between">
          <span class="text-sm text-gray-600">Submitted</span>
          <span class="text-sm font-medium">2024-01-20</span>
        </div>
        <div class="flex justify-between">
          <span class="text-sm text-gray-600">Due Date</span>
          <span class="text-sm font-medium">2024-01-25</span>
        </div>
      </div>
      <div class="bg-gray-50 rounded-xl p-4">
        <div class="flex justify-between text-sm">
          <span>Grade</span>
          <span class="font-semibold text-gray-900">-</span>
        </div>
      </div>
      <button class="w-full mt-4 bg-purple-600 text-white py-2 rounded-xl hover:bg-purple-700 transition">View Submission</button>
    </div>

    <!-- More submission cards -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-900">Science Project</h3>
        <span class="px-3 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">Graded</span>
      </div>
      <div class="space-y-2 mb-6">
        <div class="flex justify-between">
          <span class="text-sm text-gray-600">Submitted</span>
          <span class="text-sm font-medium">2024-01-18</span>
        </div>
        <div class="flex justify-between">
          <span class="text-sm text-gray-600">Due Date</span>
          <span class="text-sm font-medium">2024-01-22</span>
        </div>
      </div>
      <div class="bg-gray-50 rounded-xl p-4">
        <div class="flex justify-between text-sm">
          <span>Grade</span>
          <span class="font-semibold text-green-600">A (95%)</span>
        </div>
      </div>
      <button class="w-full mt-4 bg-gray-200 text-gray-900 py-2 rounded-xl hover:bg-gray-300 transition">View Details</button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-900">History Test</h3>
        <span class="px-3 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-800">Late</span>
      </div>
      <div class="space-y-2 mb-6">
        <div class="flex justify-between">
          <span class="text-sm text-gray-600">Submitted</span>
          <span class="text-sm font-medium">2024-01-26</span>
        </div>
        <div class="flex justify-between">
          <span class="text-sm text-gray-600">Due Date</span>
          <span class="text-sm font-medium">2024-01-25</span>
        </div>
      </div>
      <div class="bg-gray-50 rounded-xl p-4">
        <div class="flex justify-between text-sm">
          <span>Grade</span>
          <span class="font-semibold text-gray-900">-</span>
        </div>
      </div>
      <button class="w-full mt-4 bg-purple-600 text-white py-2 rounded-xl hover:bg-purple-700 transition">Resubmit</button>
    </div>
