<div class="p-6 max-w-4xl space-y-8">
  <!-- Payment History -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100">
    <div class="p-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-4">Payment History</h2>
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Amount</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Method</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr>
              <td class="px-6 py-6">2024-01-15</td>
              <td class="px-6 py-6 font-medium">$1,250</td>
              <td class="px-6 py-6 text-gray-500">Credit Card</td>
              <td class="px-6 py-6">
                <span class="px-3 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">Success</span>
              </td>
            </tr>
            <!-- More rows -->
            <tr>
              <td class="px-6 py-6">2024-01-10</td>
              <td class="px-6 py-6 font-medium">$950</td>
              <td class="px-6 py-6 text-gray-500">Bank Transfer</td>
              <td class="px-6 py-6">
                <span class="px-3 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">Success</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Payment Form -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Make a Payment</h2>
    <form class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-2">Amount</label>
        <input type="number" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent" placeholder="$0.00" step="0.01">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-2">Payment Method</label>
        <select class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent">
          <option>Credit Card</option>
          <option>Debit Card</option>
          <option>Bank Transfer</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-2">Reference Number</label>
        <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent" placeholder="Enter reference">
      </div>
      <button type="submit" class="w-full bg-purple-600 text-white py-4 px-6 rounded-xl hover:bg-purple-700 shadow-sm transition font-medium text-lg">Pay Now</button>
    </form>
  </div>
</div>
