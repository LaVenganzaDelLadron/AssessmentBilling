<div class="p-8">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Assessments</h1>
      <p class="text-slate-500 text-sm mt-1">Manage academic assessments and evaluations.</p>
    </div>
    <button (click)="openAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">
      + Create Assessment
    </button>
  </div>

  <!-- Search & Filter -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <input [(ngModel)]="searchQuery" placeholder="Search student, term, or status..."
      class="px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    <select [(ngModel)]="statusFilter" class="px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option value="">All Status</option>
      <option value="draft">Draft</option>
      <option value="finalized">Finalized</option>
    </select>
  </div>

  <!-- Error State -->
  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
    <p class="text-red-700 font-semibold">{{ errorMessage }}</p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">

      <app-assessment-card
        *ngFor="let assessment of getFilteredAssessments()"
        [assessment]="assessment"
        (editRequested)="openUpdateModal($event)"
        (deleteRequested)="openDeleteModal($event)"
      ></app-assessment-card>
    </div>
    <div *ngIf="getFilteredAssessments().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
      {{ searchQuery || statusFilter ? 'No assessments matched your filters' : 'No assessments found' }}
    </div>
  </div>

  <!-- Modals -->
  <app-add-assessments-modal (refresh)="loadAssessments()"></app-add-assessments-modal>
  <app-update-assessments-modal (refresh)="loadAssessments()"></app-update-assessments-modal>
  <app-delete-assessments-modal (refresh)="loadAssessments()"></app-delete-assessments-modal>
