<div class="min-h-screen bg-[#fcfdfe] font-sans text-slate-800 antialiased selection:bg-indigo-100 p-6 lg:p-12">

  <div class="max-w-[1600px] mx-auto">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
      <div>
        <nav class="flex items-center gap-2 text-[10px] font-semibold uppercase tracking-[0.15em] text-slate-400 mb-1">
          <span>Academic</span>
          <svg class="w-2.5 h-2.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
          <span class="text-indigo-500/80">Assessments</span>
        </nav>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Assessments</h1>
        <p class="text-slate-500 text-sm mt-1 font-medium">Manage and monitor student evaluations.</p>
      </div>

      <button (click)="openAddModal()"
        class="group flex items-center gap-2.5 rounded-xl bg-indigo-600 px-6 py-3.5 text-sm font-bold text-white shadow-lg shadow-indigo-200 transition-all hover:bg-indigo-700 hover:-translate-y-0.5 active:scale-95">
        <svg class="w-4 h-4 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
        <span>Create Assessment</span>
      </button>
    </div>

    <div class="flex flex-col md:flex-row items-center gap-4 mb-8">
      <div class="relative w-full max-w-md group">
        <input
          [(ngModel)]="searchQuery"
          placeholder="Search student, term, or status..."
          class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200/80 rounded-[1.25rem] text-sm focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500/40 transition-all outline-none shadow-sm placeholder:text-slate-400"
        >
        <svg class="absolute left-4.5 top-4 w-4.5 h-4.5 text-slate-300 group-focus-within:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      </div>

      <div class="relative w-full md:w-64">
        <select
          [(ngModel)]="statusFilter"
          class="w-full appearance-none px-5 py-3.5 bg-white border border-slate-200/80 rounded-[1.25rem] text-sm font-bold text-slate-600 focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500/40 transition-all outline-none shadow-sm cursor-pointer"
        >
          <option value="">All Status</option>
          <option value="draft">Draft</option>
          <option value="finalized">Finalized</option>
        </select>
        <svg class="absolute right-4 top-4.5 w-4 h-4 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" /></svg>
      </div>
    </div>

    <div *ngIf="errorMessage" class="flex items-center gap-3 bg-red-50 border border-red-100 rounded-2xl p-4 mb-8 animate-in fade-in slide-in-from-top-2">
      <div class="p-2 bg-white rounded-lg text-red-500 shadow-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      </div>
      <p class="text-red-700 text-sm font-bold">{{ errorMessage }}</p>
    </div>

    <div class="bg-white border border-slate-200/70 rounded-[2rem] shadow-xl shadow-slate-200/20 p-8 min-h-[400px]">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 sm:gap-8">
        <app-assessment-card
          *ngFor="let assessment of getFilteredAssessments()"
          [assessment]="assessment"
          (editRequested)="openUpdateModal($event)"
          (deleteRequested)="openDeleteModal($event)"
          class="transition-transform duration-300 hover:-translate-y-1"
        ></app-assessment-card>
      </div>

      <div *ngIf="getFilteredAssessments().length === 0" class="flex flex-col items-center justify-center py-20 text-center">
        <div class="h-20 w-20 bg-slate-50 rounded-full flex items-center justify-center mb-4">
          <svg class="w-10 h-10 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
        </div>
        <p class="text-slate-400 font-bold tracking-tight">
          {{ searchQuery || statusFilter ? 'No assessments matched your filters' : 'No assessments found' }}
        </p>
      </div>
    </div>
  </div>

  <app-add-assessments-modal (refresh)="loadAssessments()"></app-add-assessments-modal>
  <app-update-assessments-modal (refresh)="loadAssessments()"></app-update-assessments-modal>
  <app-delete-assessments-modal (refresh)="loadAssessments()"></app-delete-assessments-modal>

</div>
