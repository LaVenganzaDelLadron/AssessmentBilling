<div class="min-h-screen bg-[#fcfdfe] font-sans text-slate-800 antialiased selection:bg-indigo-100 p-6 lg:p-12">

  <div class="max-w-[1600px] mx-auto">

    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
      <div>
        <nav class="flex items-center gap-2 text-[10px] font-semibold uppercase tracking-[0.15em] text-slate-400 mb-1">
          <span>Finance</span>
          <svg class="w-2.5 h-2.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
          <span class="text-indigo-500/80">Fee Structures</span>
        </nav>
        <h1 class="text-4xl font-black text-slate-900 tracking-tight">Fee Structures</h1>
        <p class="text-slate-500 text-sm mt-1 font-medium">Configure and manage program-specific fee templates.</p>
      </div>

      <button (click)="openAddModal()"
        class="group flex items-center gap-2.5 rounded-xl bg-indigo-600 px-8 py-4 text-sm font-bold text-white shadow-lg shadow-indigo-200 transition-all hover:bg-indigo-700 hover:-translate-y-0.5 active:scale-95">
        <svg class="w-4.5 h-4.5 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
        <span>Add New Fee</span>
      </button>
    </div>

    <div class="relative w-full max-w-2xl group mb-10">
      <input
        [(ngModel)]="searchQuery"
        placeholder="Search by fee type, program, or amount..."
        class="w-full pl-14 pr-6 py-4.5 bg-white border border-slate-200/80 rounded-[1.5rem] text-base focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500/40 transition-all outline-none shadow-sm placeholder:text-slate-400"
      >
      <svg class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-slate-300 group-focus-within:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
    </div>

    <div *ngIf="errorMessage" class="flex items-center gap-3 bg-red-50 border border-red-100 rounded-2xl p-5 mb-10 animate-in fade-in slide-in-from-top-2">
      <div class="p-2 bg-white rounded-lg text-red-500 shadow-sm">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      </div>
      <p class="text-red-700 text-sm font-bold">{{ errorMessage }}</p>
    </div>

    <div class="bg-white border border-slate-200/70 rounded-[2.5rem] shadow-2xl shadow-slate-200/20 p-10 max-h-[70vh] overflow-y-auto min-h-[400px]">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 sm:gap-10">
        <app-fee-structure-card
          *ngFor="let fee of getFilteredFees()"
          [fee]="fee"
          (editRequested)="openUpdateModal($event)"
          (deleteRequested)="openDeleteModal($event)"
          class="h-full"
        ></app-fee-structure-card>
      </div>

      <div *ngIf="getFilteredFees().length === 0" class="flex flex-col items-center justify-center py-32 text-center">
        <div class="h-28 w-28 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mb-6 rotate-3 border border-slate-100">
          <svg class="w-14 h-14 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <h3 class="text-slate-900 font-black text-xl mb-1">No Fee Data Found</h3>
        <p class="text-slate-400 font-medium max-w-sm mx-auto text-sm">
          {{ searchQuery ? 'No fee structures match your search criteria.' : 'Start by adding a new fee structure to your programs.' }}
        </p>
      </div>
    </div>
  </div>

  <app-add-fee-structure-modal (refresh)="loadFees()"></app-add-fee-structure-modal>
  <app-update-fee-structure-modal (refresh)="loadFees()"></app-update-fee-structure-modal>
  <app-delete-fee-structure-modal (refresh)="loadFees()"></app-delete-fee-structure-modal>

</div>
