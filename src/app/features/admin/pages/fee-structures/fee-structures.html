<div class="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-slate-100 antialiased">
  <div class="bg-white/10 backdrop-blur-md border-b border-white/10 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-black text-white tracking-tight">Fee Structures</h1>
          <p class="text-sm text-slate-400 mt-1">Manage program fee structures</p>
        </div>
        <button (click)="openAddModal()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold transition-all shadow-lg hover:-translate-y-0.5">+ Add Fee</button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="mb-8">
      <input [(ngModel)]="searchQuery" type="text" placeholder="Search by fee type..." class="w-full px-4 py-3 bg-white/5 backdrop-blur-sm border border-white/10 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 transition-all" />
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg text-red-200">{{ errorMessage }}</div>

    <div *ngIf="isLoading" class="flex justify-center items-center py-12"><div class="text-white">Loading...</div></div>

    <div *ngIf="!isLoading" class="bg-white/10 backdrop-blur-md border border-white/10 rounded-lg overflow-hidden">
      <table class="w-full">
        <thead>
          <tr class="bg-white/5 border-b border-white/10">
            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-200">Program ID</th>
            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-200">Fee Type</th>
            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-200">Amount</th>
            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-200">Per Unit</th>
            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-200">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-white/10">
          <tr *ngFor="let fee of getFilteredFees()" class="hover:bg-white/5 transition-all">
            <td class="px-6 py-4 text-sm text-white font-medium">{{ fee.program_id }}</td>
            <td class="px-6 py-4 text-sm text-slate-300">{{ fee.fee_type }}</td>
            <td class="px-6 py-4 text-sm text-slate-300">${{ fee.amount.toFixed(2) }}</td>
            <td class="px-6 py-4 text-sm text-slate-300">{{ fee.per_unit ? 'Yes' : 'No' }}</td>
            <td class="px-6 py-4 space-x-2">
              <button (click)="openUpdateModal(fee)" class="px-3 py-2 bg-blue-500/20 hover:bg-blue-500/30 text-blue-200 text-xs rounded font-semibold transition-all">Edit</button>
              <button (click)="openDeleteModal(fee)" class="px-3 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-200 text-xs rounded font-semibold transition-all">Delete</button>
            </td>
          </tr>
          <tr *ngIf="getFilteredFees().length === 0">
            <td colspan="5" class="px-6 py-8 text-center text-slate-400"><p>No fee structures found</p></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <app-add-fee-structure-modal></app-add-fee-structure-modal>
  <app-update-fee-structure-modal></app-update-fee-structure-modal>
  <app-delete-fee-structure-modal></app-delete-fee-structure-modal>
</div>
