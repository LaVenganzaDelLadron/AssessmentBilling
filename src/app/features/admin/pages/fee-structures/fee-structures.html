<div class="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-slate-100 antialiased">
  <div class="bg-white/10 backdrop-blur-md border-b border-white/10 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-black text-white tracking-tight">Fee Structures</h1>
          <p class="text-sm text-slate-400 mt-1">Manage program fee structures</p>
        </div>
        <button (click)="openAddModal()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold transition-all shadow-lg hover:-translate-y-0.5">+ Add Fee</button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="mb-8">
      <input [(ngModel)]="searchQuery" type="text" placeholder="Search by fee type, program, or amount..." class="w-full px-4 py-3 bg-white/5 backdrop-blur-sm border border-white/10 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 transition-all" />
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg text-red-200">{{ errorMessage }}</div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">

        <app-fee-structure-card
          *ngFor="let fee of getFilteredFees()"
          [fee]="fee"
          (editRequested)="openUpdateModal($event)"
          (deleteRequested)="openDeleteModal($event)"
        ></app-fee-structure-card>
      </div>
      <div *ngIf="getFilteredFees().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
        {{ searchQuery ? 'No fee structures matched your search' : 'No fee structures found' }}
      </div>
    </div>
  </div>

  <app-add-fee-structure-modal (refresh)="loadFees()"></app-add-fee-structure-modal>
  <app-update-fee-structure-modal (refresh)="loadFees()"></app-update-fee-structure-modal>
  <app-delete-fee-structure-modal (refresh)="loadFees()"></app-delete-fee-structure-modal>
</div>
