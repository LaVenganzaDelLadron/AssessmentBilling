<div class="p-8">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Official Receipts</h1>
      <p class="text-slate-500 text-sm mt-1">Manage official receipts for payments.</p>
    </div>
  </div>

  <!-- Search -->
  <div class="mb-6">
    <input [(ngModel)]="searchQuery" placeholder="Search payment, OR number, or issuer..."
      class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <!-- Error State -->
  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
    <p class="text-red-700 font-semibold">{{ errorMessage }}</p>
  </div>

  <!-- Card Grid -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <app-receipt-card
        *ngFor="let receipt of getFilteredReceipts()"
        [receipt]="receipt"
        (editRequested)="openUpdateModal($event)"
        (deleteRequested)="openDeleteModal($event)"
      ></app-receipt-card>
    </div>
    <div *ngIf="getFilteredReceipts().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
      {{ searchQuery ? 'No receipts matched your search' : 'No receipts found' }}
    </div>
  </div>
</div>

<app-update-official-receipts-modal (refresh)="loadReceipts()"></app-update-official-receipts-modal>
<app-delete-official-receipts-modal (refresh)="loadReceipts()"></app-delete-official-receipts-modal>
