<div class="p-8">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Payment Methods</h1>
      <p class="text-slate-500 text-sm mt-1">Manage available payment methods for students.</p>
    </div>
    <button (click)="openAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">
      + Add Payment Method
    </button>
  </div>

  <div class="mb-6">
    <input
      [(ngModel)]="searchQuery"
      placeholder="Search payment methods..."
      class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
  </div>

  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
    <p class="text-red-700 font-semibold">{{ errorMessage }}</p>
  </div>

  <!-- Card Grid -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">

      <app-payment-method-card
        *ngFor="let method of getFilteredMethods()"
        [method]="method"
        (editRequested)="openUpdateModal($event)"
        (deleteRequested)="openDeleteModal($event)"
      ></app-payment-method-card>
    </div>
    <div *ngIf="getFilteredMethods().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
      No payment methods found
    </div>
  </div>
</div>

<app-add-payment-methods-modal (refresh)="loadMethods()"></app-add-payment-methods-modal>
<app-update-payment-methods-modal (refresh)="loadMethods()"></app-update-payment-methods-modal>
<app-delete-payment-methods-modal (refresh)="loadMethods()"></app-delete-payment-methods-modal>
