<div class="min-h-screen bg-slate-50 font-sans text-slate-900 selection:bg-slate-100 antialiased">
  <div class="bg-white/10 backdrop-blur-md border-b border-white/10 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-black text-white tracking-tight">Enrollments</h1>
          <p class="text-sm text-slate-400 mt-1">Manage student enrollments</p>
        </div>
        <button (click)="openAddModal()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold transition-all shadow-lg hover:-translate-y-0.5">+ Add Enrollment</button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="mb-8">
      <input [(ngModel)]="searchQuery" type="text" placeholder="Search by student, subject, term, or status..." class="w-full px-4 py-3 bg-white/5 backdrop-blur-sm border border-white/10 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 transition-all" />
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-lg text-red-200">{{ errorMessage }}</div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <app-enrollment-card
          *ngFor="let enrollment of getFilteredEnrollments()"
          [enrollment]="enrollment"
        ></app-enrollment-card>
      </div>
      <div *ngIf="getFilteredEnrollments().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
        {{ searchQuery || statusFilter ? 'No enrollments matched your filters' : 'No enrollments found' }}
      </div>
    </div>
  </div>

  <app-add-enrollment-modal (refresh)="loadEnrollments()"></app-add-enrollment-modal>
  <app-update-enrollment-modal (refresh)="loadEnrollments()"></app-update-enrollment-modal>
  <app-delete-enrollment-modal (refresh)="loadEnrollments()"></app-delete-enrollment-modal>
</div>
