<div class="min-h-screen bg-[#fcfdfe] font-sans text-slate-800 antialiased selection:bg-emerald-100 p-6 lg:p-12">

  <div class="max-w-[1600px] mx-auto">

    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
      <div>
        <nav class="flex items-center gap-2 text-[10px] font-semibold uppercase tracking-[0.15em] text-slate-400 mb-1">
          <span>Faculty</span>
          <svg class="w-2.5 h-2.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
          <span class="text-emerald-500/80">Teacher Directory</span>
        </nav>
        <h1 class="text-4xl font-black text-slate-900 tracking-tight">Teachers</h1>
        <p class="text-slate-500 text-sm mt-1 font-medium">Manage faculty records, departments, and teaching assignments.</p>
      </div>
    </div>

    <div class="relative w-full max-w-2xl group mb-10">
      <input
        [(ngModel)]="searchQuery"
        placeholder="Search by teacher ID, name, department, or user..."
        class="w-full pl-14 pr-6 py-4.5 bg-white border border-slate-200/80 rounded-[1.5rem] text-base focus:ring-4 focus:ring-emerald-500/5 focus:border-emerald-500/40 transition-all outline-none shadow-sm placeholder:text-slate-400"
      >
      <svg class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-slate-300 group-focus-within:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
    </div>

    <div *ngIf="errorMessage" class="flex items-center gap-3 bg-red-50 border border-red-100 rounded-2xl p-5 mb-10 animate-in fade-in slide-in-from-top-2">
      <div class="p-2 bg-white rounded-lg text-red-500 shadow-sm">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      </div>
      <p class="text-red-700 text-sm font-bold">{{ errorMessage }}</p>
    </div>

    <div class="bg-white border border-slate-200/70 rounded-[2.5rem] shadow-2xl shadow-slate-200/20 p-10 min-h-[600px]">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 sm:gap-10">
        <app-teacher-card
          *ngFor="let teacher of getFilteredTeachers(); trackBy: trackByTeacherId"
          [teacher]="teacher"
          (editRequested)="openUpdateModal($event)"
          (deleteRequested)="openDeleteModal($event)"
          class="h-full"
        ></app-teacher-card>
      </div>

      <div *ngIf="getFilteredTeachers().length === 0" class="flex flex-col items-center justify-center py-32 text-center">
        <div class="h-28 w-28 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mb-6 rotate-3 border border-slate-100">
          <svg class="w-14 h-14 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H14" /></svg>
        </div>
        <h3 class="text-slate-900 font-black text-xl mb-1">Teacher Not Found</h3>
        <p class="text-slate-400 font-medium max-w-sm mx-auto text-sm">
          {{ searchQuery ? 'We couldn\'t find any faculty records matching your current search criteria.' : 'The faculty directory is currently empty.' }}
        </p>
      </div>
    </div>
  </div>

  <app-update-teacher-modal (refresh)="loadTeachers()"></app-update-teacher-modal>
  <app-delete-teacher-modal (refresh)="loadTeachers()"></app-delete-teacher-modal>

</div>
