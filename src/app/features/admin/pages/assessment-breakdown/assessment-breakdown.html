<div class="p-8">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Assessment Breakdowns</h1>
      <p class="text-slate-500 text-sm mt-1">Manage assessment criteria and scoring details.</p>
    </div>
    <button (click)="openAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">
      + Add Breakdown
    </button>
  </div>

  <!-- Search -->
  <div class="mb-6">
    <input [(ngModel)]="searchQuery" placeholder="Search breakdowns..."
      class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex justify-center py-12">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-slate-600">Loading assessment breakdowns...</p>
    </div>
  </div>

  <!-- Error State -->
  <div *ngIf="errorMessage && !isLoading" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
    <p class="text-red-700 font-semibold">{{ errorMessage }}</p>
  </div>

  <!-- Table -->
  <div *ngIf="!isLoading" class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">ID</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Breakdown Component</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Percentage</th>
          <th class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr *ngFor="let breakdown of getFilteredBreakdowns()" class="hover:bg-slate-50 transition-colors">
          <td class="px-6 py-4 text-sm font-semibold text-slate-900">{{ breakdown.id }}</td>
          <td class="px-6 py-4 text-sm text-slate-700">{{ breakdown.breakdown_name || '-' }}</td>
          <td class="px-6 py-4 text-sm text-slate-700">{{ breakdown.percentage || 0 }}%</td>
          <td class="px-6 py-4 text-sm space-x-2">
            <button (click)="openUpdateModal(breakdown)" class="text-blue-600 font-bold hover:underline">Edit</button>
            <button (click)="openDeleteModal(breakdown)" class="text-red-600 font-bold hover:underline">Delete</button>
          </td>
        </tr>
        <tr *ngIf="getFilteredBreakdowns().length === 0">
          <td colspan="4" class="px-6 py-8 text-center text-slate-500 italic">No assessment breakdowns found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modals -->
<app-add-assessment-breakdown-modal (refresh)="loadBreakdowns()"></app-add-assessment-breakdown-modal>
<app-update-assessment-breakdown-modal (refresh)="loadBreakdowns()"></app-update-assessment-breakdown-modal>
<app-delete-assessment-breakdown-modal (refresh)="loadBreakdowns()"></app-delete-assessment-breakdown-modal>
