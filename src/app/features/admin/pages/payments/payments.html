z<div class="p-8">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Payments</h1>
      <p class="text-slate-500 text-sm mt-1">Listing data from <span class="font-semibold">GET /api/admin/payments</span>.</p>
    </div>
    <input
      [(ngModel)]="searchQuery"
      type="text"
      placeholder="Search invoice, amount, reference, or method..."
      class="w-full md:w-96 px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
    <p class="text-red-700 font-semibold">{{ errorMessage }}</p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <app-payment-card
        *ngFor="let payment of getFilteredPayments()"
        [payment]="payment"
        (editRequested)="openUpdateModal($event)"
        (deleteRequested)="openDeleteModal($event)"
      ></app-payment-card>
    </div>
    <div *ngIf="getFilteredPayments().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
      {{ searchQuery ? 'No payments matched your search' : 'No payments found' }}
    </div>
  </div>
</div>

<app-update-payment-modal></app-update-payment-modal>
<app-delete-payment-modal></app-delete-payment-modal>
