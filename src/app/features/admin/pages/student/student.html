<div class="p-8">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Students</h1>
      <p class="text-slate-500 text-sm mt-1">Listing data from <span class="font-semibold">GET /api/admin/students</span>.</p>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
      <input
        [(ngModel)]="searchQuery"
        type="text"
        placeholder="Search by student no, name, program, or status..."
        class="w-full sm:w-96 px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />

      <select
        [(ngModel)]="statusFilter"
        class="px-4 py-3 border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
      >
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>
  </div>

  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
    <p class="text-red-700 font-semibold">{{ errorMessage }}</p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <app-student-card
        *ngFor="let student of getFilteredStudents(); trackBy: trackByStudentId"
        [student]="student"
      ></app-student-card>
    </div>
    <div *ngIf="getFilteredStudents().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
      {{ searchQuery || statusFilter ? 'No students matched your filters' : 'No students found' }}
    </div>
  </div>
</div>
