<div class="p-8">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Official Receipts</h1>
      <p class="text-slate-500 text-sm mt-1">Listing data from <span class="font-semibold">GET /api/admin/official-receipts</span>.</p>
    </div>
    <input
      [(ngModel)]="searchQuery"
      type="text"
      placeholder="Search by OR number, payment ID, or issuer..."
      class="w-full md:w-96 px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
    <p class="text-red-700 font-semibold">{{ errorMessage }}</p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <app-receipt-card
        *ngFor="let receipt of getFilteredReceipts()"
        [receipt]="receipt"
      ></app-receipt-card>
    </div>
    <div *ngIf="getFilteredReceipts().length === 0" class="px-6 py-8 text-center text-slate-500 italic">
      {{ searchQuery ? 'No official receipts matched your search' : 'No official receipts found' }}
    </div>
  </div>

  <app-add-official-receipts-modal (refresh)="loadReceipts()"></app-add-official-receipts-modal>
  <app-update-official-receipts-modal (refresh)="loadReceipts()"></app-update-official-receipts-modal>
  <app-delete-official-receipts-modal (refresh)="loadReceipts()"></app-delete-official-receipts-modal>
</div>
