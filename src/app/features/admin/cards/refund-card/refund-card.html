<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col gap-2">
	<div class="flex items-center gap-2">
		<span class="font-bold text-indigo-700 text-lg">Refund #{{ refund.id }}</span>
		<span class="text-xs text-slate-500">Status: {{ refund.status }}</span>
	</div>
	<div class="text-slate-900 font-semibold">{{ refund.reason }}</div>
	<div class="flex gap-4 text-xs text-slate-600 mt-1">
		<span>Payment: <span class="font-bold">{{ refund.payment_id }}</span></span>
		<span>Amount: <span class="font-bold">${{ refund.amount }}</span></span>
		<span>Updated: <span class="font-bold">{{ refund.updated_at | date: 'MMM dd, yyyy, h:mm a' }}</span></span>
	</div>
</div>
