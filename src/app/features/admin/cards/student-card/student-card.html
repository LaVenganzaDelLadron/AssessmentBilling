<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col gap-2">
	<div class="flex items-center gap-2">
		<span class="font-bold text-violet-700 text-lg">{{ student.student_no }}</span>
		<span class="text-xs text-slate-500">{{ student.status }}</span>
	</div>
	<div class="text-slate-900 font-semibold">{{ student.last_name }}, {{ student.first_name }} {{ student.middle_name }}</div>
	<div class="flex flex-wrap gap-4 text-xs text-slate-600 mt-1">
		<span>Program: <span class="font-bold">{{ (student.program?.name || '—') }}</span></span>
		<span>Email: <span class="font-bold">{{ student.email || '—' }}</span></span>
		<span>Year: <span class="font-bold">{{ student.year_level }}</span></span>
		<span>Updated: <span class="font-bold">{{ student.updated_at | date: 'medium' }}</span></span>
	</div>
	<div class="flex-1 min-h-[120px]"></div>
	<div class="mt-3 flex flex-col xs:flex-row gap-2 border-t border-slate-100 pt-3">
		<button type="button" (click)="requestEdit()" class="flex-1 rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 transition hover:border-blue-200 hover:bg-blue-50 hover:text-blue-700">Edit</button>
		<button type="button" (click)="requestDelete()" class="flex-1 rounded-lg border border-red-200 px-3 py-2 text-sm font-semibold text-red-600 transition hover:bg-red-50">Delete</button>
	</div>
</div>
