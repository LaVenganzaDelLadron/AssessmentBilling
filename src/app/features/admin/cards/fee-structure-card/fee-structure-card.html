<div class="group relative flex flex-col h-full overflow-hidden rounded-[1.5rem] border border-slate-200/70 bg-white p-5 shadow-sm transition-all duration-300 hover:shadow-xl hover:shadow-indigo-500/10 hover:border-indigo-200/50">

  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-50 text-indigo-600 font-black text-[10px]">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      </div>
      <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">{{ fee.fee_type }}</span>
    </div>

    <span class="inline-flex items-center px-2.5 py-1 rounded-md bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-tight ring-1 ring-indigo-100">
      ₱{{ fee.amount }}
    </span>
  </div>

  <div class="flex-grow space-y-1 mb-5">
    <div class="flex items-start gap-2 text-slate-900 font-extrabold tracking-tight leading-snug">
      <svg class="w-4 h-4 mt-0.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
      <span class="min-h-[2.5rem] block">Program: {{ fee.program_id }}</span>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-3 p-3 rounded-2xl bg-slate-50/50 border border-slate-100 mb-5">
    <div class="flex flex-col">
      <span class="text-[9px] font-bold text-slate-400 uppercase">Calculation</span>
      <span class="text-[11px] font-black text-slate-700">
        {{ fee.per_unit ? 'Per Unit Basis' : 'Fixed Amount' }}
      </span>
    </div>
    <div class="flex flex-col text-right">
      <span class="text-[9px] font-bold text-slate-400 uppercase">Unit Weighted</span>
      <span [ngClass]="fee.per_unit ? 'text-indigo-600' : 'text-slate-400'" class="text-[11px] font-black uppercase">
        {{ fee.per_unit ? 'Enabled' : 'Disabled' }}
      </span>
    </div>
  </div>

  <div class="mt-auto flex gap-2 pt-4 border-t border-slate-100">
    <button (click)="requestEdit()" class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-xs font-black text-slate-600 transition-all hover:border-indigo-200 hover:bg-indigo-50 hover:text-indigo-600 active:scale-95">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
      EDIT
    </button>
    <button (click)="requestDelete()" class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-transparent bg-slate-50 px-3 py-2.5 text-xs font-black text-slate-400 transition-all hover:bg-red-50 hover:text-red-600 active:scale-95">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
      DELETE
    </button>
  </div>
</div>
