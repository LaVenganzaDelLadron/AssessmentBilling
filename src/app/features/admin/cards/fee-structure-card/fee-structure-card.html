<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col gap-2">
	<div class="flex items-center gap-2">
		<span class="font-bold text-indigo-700 text-lg">Program: {{ fee.program_id }}</span>
		<span class="text-xs text-slate-500">{{ fee.fee_type }}</span>
	</div>
	<div class="flex gap-4 text-xs text-slate-600 mt-1">
		<span>Amount: <span class="font-bold">${{ fee.amount }}</span></span>
		<span>Per Unit: <span class="font-bold">{{ fee.per_unit ? 'Yes' : 'No' }}</span></span>
	</div>
</div>
