<div class="group relative flex flex-col overflow-hidden rounded-[1.5rem] border border-slate-200/70 bg-white p-5 shadow-sm transition-all duration-300 hover:shadow-xl hover:shadow-indigo-500/10 hover:border-indigo-200/50">

  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-50 text-indigo-600 font-black text-[10px]">
        #{{ breakdown.assessment_id }}
      </div>
      <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Breakdown</span>
    </div>

    <span class="inline-flex items-center px-2.5 py-1 rounded-md bg-slate-50 text-slate-500 text-[10px] font-black uppercase tracking-tight ring-1 ring-slate-100 group-hover:bg-indigo-50 group-hover:text-indigo-600 group-hover:ring-indigo-100 transition-colors">
      ● {{ breakdown.source_type }}
    </span>
  </div>

  <div class="space-y-1 mb-5">
    <div class="flex items-start gap-2 text-slate-900 font-extrabold tracking-tight leading-snug min-h-[40px]">
      <svg class="w-4 h-4 mt-0.5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
      <span>{{ breakdown.description || 'No Description Provided' }}</span>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-3 p-3 rounded-2xl bg-slate-50/50 border border-slate-100 mb-5">
    <div class="flex flex-col">
      <span class="text-[9px] font-bold text-slate-400 uppercase">Units / Rate</span>
      <span class="text-sm font-black text-slate-700">
        {{ breakdown.units }} <span class="mx-1 text-slate-300">×</span> {{ breakdown.rate }}
      </span>
    </div>
    <div class="flex flex-col text-right">
      <span class="text-[9px] font-bold text-slate-400 uppercase">Total Amount</span>
      <span class="text-sm font-black text-indigo-600">₱{{ breakdown.amount }}</span>
    </div>
  </div>

  <div class="flex items-center justify-between px-1 text-[10px] font-bold text-slate-400 mb-6">
    <div class="flex gap-4">
      <span class="flex items-center gap-1">
        <svg class="w-3 h-3 opacity-50" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z" /></svg>
        Source: <span class="text-slate-600">{{ breakdown.source_type | titlecase }}</span>
      </span>
    </div>
  </div>

  <div class="mt-auto flex gap-2 pt-4 border-t border-slate-100">
    <button (click)="requestEdit()" class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-xs font-black text-slate-600 transition-all hover:border-indigo-200 hover:bg-indigo-50 hover:text-indigo-600 active:scale-95">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
      EDIT
    </button>
    <button (click)="requestDelete()" class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-transparent bg-slate-50 px-3 py-2.5 text-xs font-black text-slate-400 transition-all hover:bg-red-50 hover:text-red-600 active:scale-95">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
      DELETE
    </button>
  </div>
</div>
