<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col gap-2">
	<div class="flex items-center gap-2">
		<span class="font-bold text-violet-700 text-lg">{{ program.name }}</span>
		<span class="text-xs text-slate-500">({{ program.status || '—' }})</span>
	</div>
	<div class="text-slate-900 font-semibold">{{ program.department || '—' }}</div>
	<div class="flex flex-wrap gap-4 text-xs text-slate-600 mt-1">
		<span>ID: <span class="font-bold">{{ program.id }}</span></span>
		<span>Code: <span class="font-bold">{{ program.code || '—' }}</span></span>
		<span>Updated: <span class="font-bold">{{ program.updated_at | date: 'short' }}</span></span>
	</div>
	<div class="flex-1 min-h-[120px]"></div>
</div>
