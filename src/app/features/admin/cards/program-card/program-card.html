<div class="group relative bg-white border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md hover:border-blue-200 transition-all duration-200">
  <div class="flex flex-col lg:flex-row lg:items-start justify-between gap-6">

    <div class="space-y-1">
      <div class="flex items-center gap-3">
        <h3 class="font-bold text-xl text-slate-900 tracking-tight leading-tight">
          {{ program.name }}
        </h3>
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-100 uppercase tracking-wider">
          {{ program.status || 'Draft' }}
        </span>
      </div>

      <p class="flex items-center text-slate-500 font-medium">
        <svg class="w-4 h-4 mr-1.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        {{ program.department }}
      </p>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-4 lg:flex lg:flex-row gap-4 lg:gap-8 items-start lg:items-center">

      <div class="space-y-1">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Internal Details</p>
        <div class="flex flex-col text-sm text-slate-600">
          <span class="font-mono text-xs"><span class="text-slate-400">ID:</span> {{ program.id }}</span>
          <span class="font-mono text-xs"><span class="text-slate-400">CODE:</span> {{ program.code || '—' }}</span>
        </div>
      </div>

      <div class="lg:text-right space-y-1 lg:ml-auto">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Last Activity</p>
        <p class="text-xs text-slate-600 font-medium">
          {{ program.updated_at | date: 'MMM d, y h:mm a' }}
        </p>
      </div>

    </div>
  </div>
</div>
