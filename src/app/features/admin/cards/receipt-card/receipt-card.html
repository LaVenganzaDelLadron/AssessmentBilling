<div class="group relative flex flex-col h-full overflow-hidden rounded-[1.5rem] border border-slate-200/70 bg-white p-5 shadow-sm transition-all duration-300 hover:shadow-xl hover:shadow-emerald-500/10 hover:border-emerald-200/50">

  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-emerald-50 text-emerald-600 font-black text-[10px]">
        OR
      </div>
      <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Ref: #{{ receipt.payment_id }}</span>
    </div>

    <span class="inline-flex items-center px-2.5 py-1 rounded-md bg-emerald-50 text-emerald-600 ring-emerald-100 text-[10px] font-black uppercase tracking-tight ring-1">
      ● OFFICIAL
    </span>
  </div>

  <div class="flex-grow space-y-1 mb-5">
    <h2 class="text-xl font-black text-slate-900 leading-tight tracking-tight min-h-[3rem] flex items-baseline gap-2">
      <span class="text-slate-400 text-sm font-bold uppercase tracking-widest">OR #</span>
      {{ receipt.or_number }}
    </h2>
    <p class="text-[10px] font-bold text-slate-400 flex items-center gap-1.5 uppercase tracking-wide">
      <svg class="w-3.5 h-3.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
      Issuer: <span class="text-emerald-600">{{ receipt.issued_by }}</span>
    </p>
  </div>

  <div class="grid grid-cols-1 gap-2 p-3 rounded-2xl bg-slate-50/50 border border-slate-100 mb-6">
    <div class="flex items-center justify-between">
      <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Issuance Date</span>
      <span class="text-[11px] font-black text-slate-700">{{ receipt.issued_at | date: 'MMM dd, yyyy' }}</span>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Timestamp</span>
      <span class="text-[11px] font-black text-slate-700 font-mono">{{ receipt.issued_at | date: 'hh:mm a' }}</span>
    </div>
  </div>

  <div class="mt-auto flex gap-2 pt-4 border-t border-slate-100">
    <button (click)="requestEdit()" class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-xs font-black text-slate-600 transition-all hover:border-emerald-200 hover:bg-emerald-50 hover:text-emerald-600 active:scale-95">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
      EDIT
    </button>
    <button (click)="requestDelete()" class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-transparent bg-slate-50 px-3 py-2.5 text-xs font-black text-slate-400 transition-all hover:bg-red-50 hover:text-red-600 active:scale-95">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
      DELETE
    </button>
  </div>
</div>
