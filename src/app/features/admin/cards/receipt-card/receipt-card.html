<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col gap-2">
	<div class="flex items-center gap-2">
		<span class="font-bold text-indigo-700 text-lg">OR #: {{ receipt.or_number }}</span>
		<span class="text-xs text-slate-500">Payment: {{ receipt.payment_id }}</span>
	</div>
	<div class="flex gap-4 text-xs text-slate-600 mt-1">
		<span>Issued By: <span class="font-bold">{{ receipt.issued_by }}</span></span>
		<span>Issued At: <span class="font-bold">{{ receipt.issued_at | date: 'medium' }}</span></span>
	</div>
</div>
