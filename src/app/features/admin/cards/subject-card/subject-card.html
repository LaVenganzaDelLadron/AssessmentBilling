<div class="group relative flex flex-col h-full overflow-hidden rounded-[1.5rem] border border-slate-200/70 bg-white p-5 shadow-sm transition-all duration-300 hover:shadow-xl hover:shadow-violet-500/10 hover:border-violet-200/50 stroke-[2.5]">


  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-violet-50 text-violet-600 font-black text-[10px]">
        SUBJ
      </div>
      <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">{{ subject.code }}</span>
    </div>

    <span [ngClass]="{
        'bg-emerald-50 text-emerald-600 ring-emerald-100': subject.status === 'active',
        'bg-slate-50 text-slate-400 ring-slate-100': subject.status !== 'active'
      }" class="inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-tight ring-1">
      ● {{ subject.status || 'Draft' }}
    </span>
  </div>

  <div class="flex-grow space-y-1 mb-5">
    <h2 class="text-lg font-black text-slate-900 leading-tight tracking-tight min-h-[3rem]">
      {{ subject.name }}
    </h2>
    <p class="text-[10px] font-bold text-slate-400 flex items-center gap-1.5 uppercase tracking-wide">
      <svg class="w-3.5 h-3.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 7h.01M7 11h.01M7 15h.01M11 7h.01M11 11h.01M11 15h.01M15 7h.01M15 11h.01M15 15h.01" /></svg>
      Legacy Code: <span class="text-slate-600">{{ subject.subject_code || 'N/A' }}</span>
    </p>
  </div>

  <div class="grid grid-cols-2 gap-3 p-3 rounded-2xl bg-slate-50/50 border border-slate-100 mb-5">
    <div class="flex flex-col">
      <span class="text-[9px] font-bold text-slate-400 uppercase">Credit Units</span>
      <span class="text-[11px] font-black text-slate-700">{{ subject.units }} Units</span>
    </div>
    <div class="flex flex-col text-right">
      <span class="text-[9px] font-bold text-slate-400 uppercase">Category</span>
      <span class="text-[11px] font-black text-violet-600">{{ subject.type || 'Lecture' }}</span>
    </div>
  </div>

  <div *ngIf="subject.custom_id" class="px-1 text-[9px] font-bold text-slate-300 mb-4 tracking-widest uppercase">
    Ref: {{ subject.custom_id }}
  </div>
</div>
