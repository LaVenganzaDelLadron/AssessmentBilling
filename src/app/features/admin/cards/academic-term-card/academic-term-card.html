<div class="group relative flex flex-col gap-4 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition-all duration-300 hover:border-indigo-200 hover:shadow-indigo-100/50">

  <div class="flex items-center justify-between">
    <h3 class="text-lg font-black text-slate-900 tracking-tight">{{ term.school_year }}</h3>

    <span [ngClass]="term.is_active ? 'bg-emerald-50 text-emerald-700 ring-emerald-100/50' : 'bg-slate-100 text-slate-500 ring-slate-200/50'"
          class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ring-1 ring-inset">
      <span [ngClass]="term.is_active ? 'bg-emerald-500' : 'bg-slate-400'" class="h-1.5 w-1.5 rounded-full animate-pulse"></span>
      {{ term.is_active ? 'Active' : 'Archived' }}
    </span>
  </div>

  <div class="space-y-0.5">
    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Semester</p>
    <p class="text-sm font-semibold text-slate-800">{{ term.semester }}</p>
  </div>

  <div class="flex items-center gap-2 pt-3 border-t border-slate-100">
    <svg class="h-4 w-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
    </svg>
    <span class="text-sm text-slate-600 font-medium">
      {{ term.start_date | date: 'MMM d' }} — {{ term.end_date | date: 'MMM d, yyyy' }}
    </span>
  </div>
</div>
