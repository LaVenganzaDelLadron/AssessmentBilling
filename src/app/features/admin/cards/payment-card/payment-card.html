<div class="group relative flex h-full flex-col overflow-hidden rounded-[1.5rem] border border-slate-200/70 bg-white p-5 shadow-sm transition-all duration-300 hover:border-indigo-200/50 hover:shadow-xl hover:shadow-indigo-500/10">

  <div class="mb-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-50 text-[10px] font-black text-indigo-600">
        #{{ payment.id }}
      </div>
      <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Payment</span>
    </div>

    <span class="inline-flex items-center rounded-md bg-slate-50 px-2.5 py-1 text-[10px] font-black uppercase tracking-tight text-slate-500 ring-1 ring-slate-100">
      ● {{ getPaymentMethodDisplay() }}
    </span>
  </div>

  <div class="mb-5 space-y-1">
    <div class="flex items-center gap-2 font-extrabold tracking-tight text-slate-900">
      <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 9V7a5 5 0 00-10 0v2m-2 0h14a1 1 0 011 1v9a2 2 0 01-2 2H6a2 2 0 01-2-2v-9a1 1 0 011-1zm7 4h.01" /></svg>
      <span>{{ getInvoiceDisplay() }}</span>
    </div>
    <p class="flex items-center gap-2 text-xs font-semibold text-slate-500">
      <svg class="h-3.5 w-3.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7h8m-8 5h5m-7 9h12a2 2 0 002-2V5a2 2 0 00-2-2H8l-4 4v12a2 2 0 002 2z" /></svg>
      {{ getReferenceDisplay() }}
    </p>
  </div>

  <div class="mb-5 grid grid-cols-2 gap-3 rounded-2xl border border-slate-100 bg-slate-50/50 p-3">
    <div class="flex flex-col">
      <span class="text-[9px] font-bold uppercase text-slate-400">Amount Paid</span>
      <span class="text-[11px] font-black text-slate-700">{{ getAmountDisplay() }}</span>
    </div>
    <div class="flex flex-col text-right">
      <span class="text-[9px] font-bold uppercase text-slate-400">Paid At</span>
      <span class="text-[11px] font-black text-indigo-600">{{ getPaidAtDisplay() }}</span>
    </div>
  </div>

  <div class="mt-auto flex gap-2 border-t border-slate-100 pt-4">
    <button
      type="button"
      (click)="requestEdit()"
      class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-xs font-black text-slate-600 transition-all hover:border-indigo-200 hover:bg-indigo-50 hover:text-indigo-600 active:scale-95"
    >
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
      EDIT
    </button>
    <button
      type="button"
      (click)="requestDelete()"
      class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-transparent bg-slate-50 px-3 py-2.5 text-xs font-black text-slate-400 transition-all hover:bg-red-50 hover:text-red-600 active:scale-95"
    >
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
      DELETE
    </button>
  </div>
</div>
