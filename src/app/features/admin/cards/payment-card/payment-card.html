<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col gap-2">
	<div class="flex items-center gap-2">
		<span class="font-bold text-violet-700 text-lg">{{ payment.invoice_id }}</span>
		<span class="text-xs text-slate-500">({{ payment.payment_method || '—' }})</span>
	</div>
	<div class="text-slate-900 font-semibold">Reference: {{ payment.reference_number || '—' }}</div>
	<div class="flex gap-4 text-xs text-slate-600 mt-1">
		<span>Amount Paid: <span class="font-bold">{{ payment.amount_paid }}</span></span>
		<span>Paid At: <span class="font-bold">{{ payment.paid_at | date: 'medium' }}</span></span>
	</div>
	<div *ngIf="payment.id" class="text-xs text-slate-400">ID: {{ payment.id }}</div>
</div>
