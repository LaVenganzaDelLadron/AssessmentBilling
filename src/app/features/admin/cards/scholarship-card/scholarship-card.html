<div class="group relative flex h-full flex-col overflow-hidden rounded-[1.5rem] border border-slate-200/70 bg-white p-5 shadow-sm transition-all duration-300 hover:border-emerald-200/60 hover:shadow-xl hover:shadow-emerald-500/10">
  <div class="mb-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-emerald-50 text-[10px] font-black text-emerald-600">
        SCH
      </div>
      <span class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Scholarship</span>
    </div>

    <span
      [ngClass]="scholarship.is_active ? 'bg-emerald-50 text-emerald-600 ring-emerald-100' : 'bg-slate-50 text-slate-500 ring-slate-100'"
      class="inline-flex items-center rounded-md px-2.5 py-1 text-[10px] font-black uppercase tracking-tight ring-1"
    >
      ● {{ getStatusLabel() }}
    </span>
  </div>

  <div class="mb-5 space-y-2">
    <h2 class="min-h-[3rem] text-lg font-black leading-tight tracking-tight text-slate-900">
      {{ scholarship.name }}
    </h2>
    <p class="text-sm font-medium leading-relaxed text-slate-500">
      {{ getDescriptionDisplay() }}
    </p>
  </div>

  <div class="mb-5 grid grid-cols-2 gap-3 rounded-2xl border border-slate-100 bg-slate-50/50 p-3">
    <div class="flex flex-col">
      <span class="text-[9px] font-bold uppercase text-slate-400">Discount</span>
      <span class="text-[11px] font-black text-slate-700">{{ getDiscountDisplay() }}</span>
    </div>
    <div class="flex flex-col text-right">
      <span class="text-[9px] font-bold uppercase text-slate-400">Applications</span>
      <span class="text-[11px] font-black text-emerald-600">{{ getApplicationsCount() }}</span>
    </div>
  </div>

  <div class="mb-4 mt-auto border-t border-slate-100 pt-4">
    <div class="flex items-center justify-between text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">
      <span>Type</span>
      <span>{{ scholarship.discount_type }}</span>
    </div>
  </div>

  <div class="flex gap-2">
    <button
      type="button"
      (click)="requestEdit()"
      class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-xs font-black text-slate-600 transition-all hover:border-emerald-200 hover:bg-emerald-50 hover:text-emerald-700 active:scale-95"
    >
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
      EDIT
    </button>
    <button
      type="button"
      (click)="requestDelete()"
      class="flex-1 flex items-center justify-center gap-2 rounded-xl border border-transparent bg-slate-50 px-3 py-2.5 text-xs font-black text-slate-400 transition-all hover:bg-red-50 hover:text-red-600 active:scale-95"
    >
      <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
      DELETE
    </button>
  </div>
</div>
