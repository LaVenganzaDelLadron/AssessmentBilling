<div class="group relative flex flex-col h-full overflow-hidden rounded-[1.5rem] border border-slate-200/70 bg-white p-5 shadow-sm transition-all duration-300 hover:shadow-xl hover:shadow-emerald-500/10 hover:border-emerald-200/50">

  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-2">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-emerald-50 text-emerald-600 font-black text-[10px]">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
      </div>
      <span class="text-sm font-black text-slate-900 tracking-tight">T-{{ teacher.teacher_id }}</span>
    </div>

    <span [ngClass]="{
        'bg-emerald-50 text-emerald-600 ring-emerald-100': teacher.status === 'active',
        'bg-slate-50 text-slate-400 ring-slate-100': teacher.status !== 'active'
      }" class="inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-black uppercase tracking-tight ring-1">
      ● {{ teacher.status }}
    </span>
  </div>

  <div class="flex-grow space-y-1 mb-5">
    <h2 class="text-lg font-black text-slate-900 leading-tight tracking-tight">
      {{ teacher.last_name }}, {{ teacher.first_name }}
      <span class="text-slate-400 font-bold">{{ teacher.middle_name }}</span>
    </h2>
    <p class="text-xs font-semibold text-slate-500 flex items-center gap-2">
      <svg class="w-3.5 h-3.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
      {{ teacher.user?.email || 'No email associated' }}
    </p>
  </div>

  <div class="grid grid-cols-1 gap-3 p-3 rounded-2xl bg-slate-50/50 border border-slate-100 mb-5">
    <div class="flex flex-col">
      <span class="text-[9px] font-bold text-slate-400 uppercase">Department / Faculty</span>
      <span class="text-[11px] font-black text-emerald-700 truncate">
        {{ teacher.department || 'Unassigned' }}
      </span>
    </div>
  </div>

  <div class="px-1 text-[10px] font-bold text-slate-400 mb-6">
    <span class="flex items-center gap-1">
      <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
      Updated: <span class="text-slate-500">{{ teacher.updated_at | date: 'shortDate' }}</span>
    </span>
  </div>
</div>
