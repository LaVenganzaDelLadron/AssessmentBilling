<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6">
    <h2 class="text-2xl font-bold text-slate-900 mb-2">Delete Refund</h2>
    <p class="text-slate-600 mb-4">Are you sure you want to delete this refund request?</p>

    <div *ngIf="selectedRefund" class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-4">
      <p class="text-sm text-slate-700">
        <strong>Amount:</strong> {{ selectedRefund.amount }}
      </p>
      <p class="text-sm text-slate-700">
        <strong>Reason:</strong> {{ selectedRefund.reason }}
      </p>
      <p class="text-sm text-slate-700">
        <strong>Status:</strong> {{ selectedRefund.status }}
      </p>
    </div>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="mb-4 p-3 bg-green-50 border border-green-200 rounded text-green-700 text-sm">
      {{ successMessage }}
    </div>

    <p class="text-sm text-slate-500 mb-6">This action cannot be undone.</p>

    <div class="flex gap-2">
      <button
        (click)="confirm()"
        [disabled]="isLoading"
        class="flex-1 bg-red-600 text-white font-medium py-2 rounded-lg hover:bg-red-700 disabled:opacity-50"
      >
        {{ isLoading ? 'Deleting...' : 'Delete' }}
      </button>
      <button
        (click)="close()"
        class="flex-1 bg-slate-300 text-slate-900 font-medium py-2 rounded-lg hover:bg-slate-400"
      >
        Cancel
      </button>
    </div>
  </div>
</div>
