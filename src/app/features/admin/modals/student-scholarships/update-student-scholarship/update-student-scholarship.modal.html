<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 py-6 backdrop-blur-sm">
  <div class="w-full max-w-3xl rounded-[2rem] bg-white p-6 shadow-2xl lg:p-8">
    <div class="mb-6 flex items-start justify-between gap-4">
      <div>
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-600">Applied Aid</p>
        <h2 class="mt-2 text-2xl font-black tracking-tight text-slate-900">Update Student Scholarship</h2>
        <p class="mt-1 text-sm font-medium text-slate-500">Adjust the scholarship assignment and instantly recalculate the billed amount.</p>
      </div>
      <button type="button" (click)="close()" class="text-2xl text-slate-400 transition hover:text-slate-700">×</button>
    </div>

    <div *ngIf="isPreparingOptions" class="mb-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm font-medium text-slate-600">
      Loading students and scholarships...
    </div>

    <form (ngSubmit)="submit()" class="space-y-5">
      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div>
          <label class="mb-1 block text-sm font-bold text-slate-700">Student</label>
          <select [(ngModel)]="form.student_id" name="student_id" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/5">
            <option [ngValue]="null">Select a student</option>
            <option *ngFor="let student of students" [ngValue]="student.id">{{ getStudentLabel(student) }}</option>
          </select>
        </div>

        <div>
          <label class="mb-1 block text-sm font-bold text-slate-700">Scholarship</label>
          <select [(ngModel)]="form.scholarship_id" name="scholarship_id" (ngModelChange)="onScholarshipChange()" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/5">
            <option [ngValue]="null">Select a scholarship</option>
            <option *ngFor="let scholarship of scholarships" [ngValue]="scholarship.id">{{ getScholarshipLabel(scholarship) }}</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
        <div>
          <label class="mb-1 block text-sm font-bold text-slate-700">Discount Type</label>
          <select [(ngModel)]="form.discount_type" name="discount_type" (ngModelChange)="recalculateAmounts()" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/5">
            <option value="percent">Percent</option>
            <option value="amount">Amount</option>
          </select>
        </div>

        <div>
          <label class="mb-1 block text-sm font-bold text-slate-700">Discount Value</label>
          <input [(ngModel)]="form.discount_value" name="discount_value" type="number" min="0" step="0.01" (ngModelChange)="recalculateAmounts()" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/5" />
        </div>

        <div>
          <label class="mb-1 block text-sm font-bold text-slate-700">Original Amount</label>
          <input [(ngModel)]="form.original_amount" name="original_amount" type="number" min="0" step="0.01" (ngModelChange)="recalculateAmounts()" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/5" />
        </div>

        <div>
          <label class="mb-1 block text-sm font-bold text-slate-700">Applied At</label>
          <input [(ngModel)]="form.applied_at" name="applied_at" type="datetime-local" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/5" />
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div class="rounded-[1.5rem] border border-slate-200 bg-slate-50 p-4">
          <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Calculated Discount</p>
          <p class="mt-2 text-2xl font-black text-cyan-700">{{ form.discount_amount }}</p>
        </div>
        <div class="rounded-[1.5rem] border border-slate-200 bg-slate-50 p-4">
          <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Final Amount</p>
          <p class="mt-2 text-2xl font-black text-slate-900">{{ form.final_amount }}</p>
        </div>
      </div>

      <div *ngIf="errorMessage" class="rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-sm font-bold text-red-700">
        {{ errorMessage }}
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button type="button" (click)="close()" class="rounded-xl bg-slate-100 px-5 py-3 text-sm font-bold text-slate-700 transition hover:bg-slate-200">Cancel</button>
        <button type="submit" [disabled]="isLoading || isPreparingOptions" class="rounded-xl bg-cyan-600 px-6 py-3 text-sm font-bold text-white transition hover:bg-cyan-700 disabled:cursor-not-allowed disabled:opacity-60">
          {{ isLoading ? 'Updating...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>
</div>
