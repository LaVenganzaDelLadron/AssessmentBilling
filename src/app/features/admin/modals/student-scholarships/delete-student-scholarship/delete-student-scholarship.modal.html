<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 py-6 backdrop-blur-sm">
  <div class="w-full max-w-md rounded-[2rem] bg-white p-6 shadow-2xl">
    <div class="mb-4 flex items-start justify-between gap-4">
      <div>
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-red-500">Delete Record</p>
        <h2 class="mt-2 text-2xl font-black tracking-tight text-slate-900">Remove Student Scholarship</h2>
      </div>
      <button type="button" (click)="close()" class="text-2xl text-slate-400 transition hover:text-slate-700">×</button>
    </div>

    <p class="text-sm font-medium leading-relaxed text-slate-500">
      This will remove the scholarship assignment for the selected student. This action cannot be undone.
    </p>

    <div *ngIf="currentEntity" class="mt-5 rounded-[1.5rem] border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700">
      <p><span class="font-black text-slate-900">Student:</span> {{ studentLabel }}</p>
      <p class="mt-2"><span class="font-black text-slate-900">Scholarship:</span> {{ scholarshipLabel }}</p>
      <p class="mt-2"><span class="font-black text-slate-900">Final Amount:</span> {{ currentEntity.final_amount }}</p>
    </div>

    <div *ngIf="errorMessage" class="mt-4 rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-sm font-bold text-red-700">
      {{ errorMessage }}
    </div>

    <div class="mt-6 flex justify-end gap-3">
      <button type="button" (click)="close()" class="rounded-xl bg-slate-100 px-5 py-3 text-sm font-bold text-slate-700 transition hover:bg-slate-200">Cancel</button>
      <button type="button" (click)="submit()" [disabled]="isLoading" class="rounded-xl bg-red-600 px-6 py-3 text-sm font-bold text-white transition hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-60">
        {{ isLoading ? 'Deleting...' : 'Delete Record' }}
      </button>
    </div>
  </div>
</div>
