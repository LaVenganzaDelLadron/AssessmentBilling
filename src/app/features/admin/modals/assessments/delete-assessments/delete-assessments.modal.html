<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 rounded-2xl">
  <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full mx-4 p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800">Delete Assessment</h2>
      <button (click)="close()" class="text-gray-500 hover:text-gray-700 text-xl">×</button>
    </div>

    <div class="mb-6">
      <p class="text-gray-600">
        Are you sure you want to delete this assessment? This action cannot be undone.
      </p>
      <div *ngIf="currentEntity" class="mt-3 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700">
        <p><strong>Student ID:</strong> {{ currentEntity.student_id }}</p>
        <p><strong>Term:</strong> {{ currentEntity.semester }} / {{ currentEntity.school_year }}</p>
        <p><strong>Net Amount:</strong> {{ currentEntity.net_amount }}</p>
      </div>
    </div>

    <div *ngIf="errorMessage" class="p-3 bg-red-100 text-red-700 rounded-lg text-sm mb-4">
      {{ errorMessage }}
    </div>

    <div class="flex justify-end gap-3">
      <button
        (click)="close()"
        class="px-4 py-2 text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-lg transition"
      >
        Cancel
      </button>
      <button
        (click)="submit()"
        [disabled]="isLoading"
        class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition disabled:opacity-50"
      >
        {{ isLoading ? 'Deleting...' : 'Delete' }}
      </button>
    </div>
  </div>
</div>
