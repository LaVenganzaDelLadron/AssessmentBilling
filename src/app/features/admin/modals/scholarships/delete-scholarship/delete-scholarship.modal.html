<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center rounded-2xl bg-black bg-opacity-50">
  <div class="mx-4 w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-xl font-bold text-gray-800">Delete Scholarship</h2>
      <button (click)="close()" class="text-xl text-gray-500 hover:text-gray-700">×</button>
    </div>

    <div class="mb-6">
      <p class="text-gray-600">
        Are you sure you want to delete this scholarship? This action cannot be undone.
      </p>
      <div *ngIf="currentEntity" class="mt-3 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700">
        <p><strong>Name:</strong> {{ currentEntity.name }}</p>
        <p><strong>Type:</strong> {{ currentEntity.discount_type }}</p>
        <p><strong>Value:</strong> {{ currentEntity.discount_value }}</p>
      </div>
    </div>

    <div *ngIf="errorMessage" class="mb-4 rounded-lg bg-red-100 p-3 text-sm text-red-700">
      {{ errorMessage }}
    </div>

    <div class="flex justify-end gap-3">
      <button
        type="button"
        (click)="close()"
        class="rounded-lg bg-gray-200 px-4 py-2 text-gray-700 transition hover:bg-gray-300"
      >
        Cancel
      </button>
      <button
        type="button"
        (click)="submit()"
        [disabled]="isLoading"
        class="rounded-lg bg-red-600 px-4 py-2 text-white transition hover:bg-red-700 disabled:opacity-50"
      >
        {{ isLoading ? 'Deleting...' : 'Delete' }}
      </button>
    </div>
  </div>
</div>
