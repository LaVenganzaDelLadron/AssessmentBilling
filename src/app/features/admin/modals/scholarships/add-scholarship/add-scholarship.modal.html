<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center rounded-2xl bg-black bg-opacity-50">
  <div class="mx-4 w-full max-w-lg rounded-2xl bg-white p-6 shadow-xl">
    <div class="mb-4 flex items-center justify-between">
      <h2 class="text-xl font-bold text-gray-800">Add Scholarship</h2>
      <button (click)="close()" class="text-xl text-gray-500 hover:text-gray-700">×</button>
    </div>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700">Scholarship Name</label>
        <input
          [(ngModel)]="form.name"
          name="name"
          type="text"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
          placeholder="Enter scholarship name"
          required
        />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700">Description</label>
        <textarea
          [(ngModel)]="form.description"
          name="description"
          rows="3"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
          placeholder="Optional scholarship description"
        ></textarea>
      </div>

      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">Discount Type</label>
          <select
            [(ngModel)]="form.discount_type"
            name="discount_type"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
          >
            <option value="percent">Percent</option>
            <option value="amount">Amount</option>
          </select>
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-gray-700">Discount Value</label>
          <input
            [(ngModel)]="form.discount_value"
            name="discount_value"
            type="number"
            min="0"
            step="0.01"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"
            placeholder="0.00"
            required
          />
        </div>
      </div>

      <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
        <input
          [(ngModel)]="form.is_active"
          name="is_active"
          type="checkbox"
          class="rounded border-gray-300"
        />
        Active
      </label>

      <div *ngIf="errorMessage" class="rounded-lg bg-red-100 p-3 text-sm text-red-700">
        {{ errorMessage }}
      </div>

      <div class="mt-6 flex justify-end gap-3">
        <button
          type="button"
          (click)="close()"
          class="rounded-lg bg-gray-200 px-4 py-2 text-gray-700 transition hover:bg-gray-300"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isLoading"
          class="rounded-lg bg-emerald-600 px-4 py-2 text-white transition hover:bg-emerald-700 disabled:opacity-50"
        >
          {{ isLoading ? 'Adding...' : 'Add Scholarship' }}
        </button>
      </div>
    </form>
  </div>
</div>
