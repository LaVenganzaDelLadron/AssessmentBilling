<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full">
    <div class="flex justify-between items-center p-6 border-b border-slate-200">
      <h2 class="text-xl font-bold">Record Payment</h2>
      <button (click)="close()" class="text-slate-500 hover:text-slate-700">×</button>
    </div>

    <form class="p-6 space-y-4" (ngSubmit)="submit()">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Invoice ID *</label>
        <input [(ngModel)]="form.invoice_id" name="invoiceId" type="number" placeholder="Enter invoice ID" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Amount Paid *</label>
        <input [(ngModel)]="form.amount_paid" name="amountPaid" type="number" placeholder="0.00" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Reference Number *</label>
        <input [(ngModel)]="form.reference_number" name="referenceNumber" type="text" placeholder="e.g., TXN-12345" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Payment Date *</label>
        <input [(ngModel)]="form.paid_at" name="paidAt" type="date" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Payment Method *</label>
        <select [(ngModel)]="form.payment_method_id" name="paymentMethodId" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">-- Select Payment Method --</option>
          <option *ngFor="let method of paymentMethods" [value]="method.id">{{ method.name }}</option>
        </select>
      </div>
    </form>

    <div *ngIf="errorMessage" class="bg-red-50 text-red-700 p-3 mx-6 mb-4 rounded">
      {{ errorMessage }}
    </div>

    <div class="flex justify-end gap-3 p-6 border-t border-slate-200">
      <button (click)="close()" class="px-4 py-2 text-slate-700 border rounded hover:bg-slate-50">Cancel</button>
      <button (click)="submit()" [disabled]="isLoading" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50">
        {{ isLoading ? 'Recording...' : 'Record Payment' }}
      </button>
    </div>
  </div>
</div>
