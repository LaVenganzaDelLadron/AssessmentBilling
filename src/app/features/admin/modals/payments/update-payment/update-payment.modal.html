<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
    <h2 class="text-2xl font-bold text-slate-900 mb-4">Update Payment</h2>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="mb-4 p-3 bg-green-50 border border-green-200 rounded text-green-700 text-sm">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Invoice ID *</label>
        <input
          type="number"
          [(ngModel)]="form.invoice_id"
          name="invoiceId"
          placeholder="Enter invoice ID"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Amount Paid *</label>
        <input
          type="number"
          [(ngModel)]="form.amount_paid"
          name="amountPaid"
          placeholder="0.00"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Reference Number *</label>
        <input
          type="text"
          [(ngModel)]="form.reference_number"
          name="referenceNumber"
          placeholder="e.g., TXN-12345"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Payment Date *</label>
        <input
          type="date"
          [(ngModel)]="form.paid_at"
          name="paidAt"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Payment Method *</label>
        <select
          [(ngModel)]="form.payment_method_id"
          name="paymentMethodId"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option value="">-- Select Payment Method --</option>
          <option *ngFor="let method of paymentMethods" [value]="method.id">{{ method.name }}</option>
        </select>
      </div>

      <div class="flex gap-2 pt-4">
        <button
          type="submit"
          [disabled]="isLoading"
          class="flex-1 bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50"
        >
          {{ isLoading ? 'Updating...' : 'Update Payment' }}
        </button>
        <button
          type="button"
          (click)="close()"
          class="flex-1 bg-slate-300 text-slate-900 font-medium py-2 rounded-lg hover:bg-slate-400"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
