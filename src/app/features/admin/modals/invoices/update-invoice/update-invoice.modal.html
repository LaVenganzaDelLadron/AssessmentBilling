<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
    <h2 class="text-2xl font-bold text-slate-900 mb-4">Update Invoice</h2>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="mb-4 p-3 bg-green-50 border border-green-200 rounded text-green-700 text-sm">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Assessment *</label>
        <select
          [(ngModel)]="form.assessment_id"
          name="assessmentId"
          (ngModelChange)="onAssessmentChange()"
          [disabled]="isLoadingAssessments"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option [ngValue]="0">-- Select Assessment --</option>
          <option *ngFor="let assessment of assessmentOptions" [ngValue]="assessment.id">
            {{ getAssessmentLabel(assessment) }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Total Amount *</label>
        <input
          type="number"
          [(ngModel)]="form.total_amount"
          name="totalAmount"
          step="0.01"
          min="0"
          placeholder="0.00"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="block text-sm font-medium text-slate-700">Balance *</label>
          <button
            type="button"
            (click)="setBalanceToTotalAmount()"
            class="text-xs font-medium text-blue-600 hover:text-blue-700"
          >
            Use total amount
          </button>
        </div>
        <input
          type="number"
          [(ngModel)]="form.balance"
          name="balance"
          step="0.01"
          min="0"
          placeholder="0.00"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Due Date *</label>
        <input
          type="date"
          [(ngModel)]="form.due_date"
          name="dueDate"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
        <select
          [(ngModel)]="form.status"
          name="status"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
        </select>
      </div>

      <div class="flex gap-2 pt-4">
        <button
          type="submit"
          [disabled]="isLoading"
          class="flex-1 bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50"
        >
          {{ isLoading ? 'Updating...' : 'Update Invoice' }}
        </button>
        <button
          type="button"
          (click)="close()"
          class="flex-1 bg-slate-300 text-slate-900 font-medium py-2 rounded-lg hover:bg-slate-400"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
