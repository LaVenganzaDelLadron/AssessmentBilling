<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 rounded-2xl">
  <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full mx-4 p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800">Add Invoice Line</h2>
      <button (click)="close()" class="text-gray-500 hover:text-gray-700 text-xl">×</button>
    </div>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Invoice Number</label>
        <select
          *ngIf="invoices.length > 0"
          [(ngModel)]="form.invoice_id"
          name="form_invoice_id"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [disabled]="isReferenceLoading"
          required
        >
          <option [ngValue]="0" disabled>
            {{ isReferenceLoading ? 'Loading invoices...' : 'Select invoice' }}
          </option>
          <option *ngFor="let invoice of invoices" [ngValue]="invoice.id">
            {{ invoice.invoice_number }}
          </option>
        </select>
        <input
          *ngIf="invoices.length === 0"
          [(ngModel)]="form.invoice_id"
          name="form_invoice_id_fallback"
          type="number"
          min="1"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter invoice ID"
          required
        />
        <p *ngIf="referenceLoadFailed" class="mt-1 text-xs text-amber-600">
          Could not load invoice list. You can still enter invoice ID manually.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Line Type</label>
        <select
          [(ngModel)]="form.line_type"
          name="form_line_type"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          (ngModelChange)="onLineTypeChange()"
          required
        >
          <option *ngFor="let lineType of lineTypes" [ngValue]="lineType">
            {{ getLineTypeLabel(lineType) }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Subject (Optional)</label>
        <select
          *ngIf="subjects.length > 0"
          [(ngModel)]="form.subject_id"
          name="form_subject_id"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [disabled]="form.line_type !== 'tuition'"
          (ngModelChange)="onSubjectChange()"
        >
          <option [ngValue]="null">No subject</option>
          <option *ngFor="let subject of subjects" [ngValue]="subject.id">
            {{ getSubjectLabel(subject) }}
          </option>
        </select>
        <input
          *ngIf="subjects.length === 0"
          [(ngModel)]="form.subject_id"
          name="form_subject_id_fallback"
          type="number"
          min="1"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [disabled]="form.line_type !== 'tuition'"
          [placeholder]="form.line_type === 'tuition' ? 'Enter subject ID' : 'No subject required'"
          (ngModelChange)="onSubjectChange()"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea
          [(ngModel)]="form.description"
          name="form_description"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter description"
          rows="3"
          required
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
        <input
          [(ngModel)]="form.quantity"
          name="form_quantity"
          type="number"
          step="0.01"
          min="0.01"
          [readonly]="isAutoUnitsEnabled()"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [placeholder]="isAutoUnitsEnabled() ? 'Auto from subject units' : 'Enter quantity'"
          required
        />
        <p *ngIf="isAutoUnitsEnabled()" class="mt-1 text-xs text-slate-500">
          Quantity is auto-filled from selected subject units.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price</label>
        <input
          [(ngModel)]="form.unit_price"
          name="form_unit_price"
          type="number"
          step="0.01"
          min="0"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter unit price"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
        <input
          [ngModel]="computedAmount"
          name="form_amount_preview"
          type="number"
          step="0.01"
          readonly
          class="w-full px-3 py-2 border border-gray-200 bg-gray-50 text-gray-700 rounded-lg"
        />
      </div>

      <div *ngIf="errorMessage" class="p-3 bg-red-100 text-red-700 rounded-lg text-sm">
        {{ errorMessage }}
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <button
          type="button"
          (click)="close()"
          class="px-4 py-2 text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-lg transition"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="isLoading"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition disabled:opacity-50"
        >
          {{ isLoading ? 'Adding...' : 'Add Line' }}
        </button>
      </div>
    </form>
  </div>
</div>
