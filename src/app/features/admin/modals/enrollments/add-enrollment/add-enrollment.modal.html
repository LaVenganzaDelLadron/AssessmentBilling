<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
    <h2 class="text-2xl font-bold text-slate-900 mb-4">Add Enrollment</h2>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="mb-4 p-3 bg-green-50 border border-green-200 rounded text-green-700 text-sm">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Student *</label>
        <select
          [(ngModel)]="form.student_id"
          name="studentId"
          [disabled]="isLoadingStudents"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option [ngValue]="null">-- Select Student --</option>
          <option *ngFor="let student of studentOptions" [ngValue]="student.id">
            {{ getStudentName(student) }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Subjects * (select multiple)</label>
        <div *ngIf="isLoadingSubjects" class="text-sm text-slate-500 mb-2">Loading subjects...</div>
        <div
          *ngIf="!isLoadingSubjects"
          class="max-h-44 overflow-y-auto border border-slate-300 rounded-lg p-2 bg-slate-50 space-y-1"
        >
          <label
            *ngFor="let subject of subjectOptions"
            class="flex items-center gap-2 rounded px-2 py-1 text-sm text-slate-700 hover:bg-white"
          >
            <input
              type="checkbox"
              [checked]="isSubjectSelected(subject.id)"
              (change)="toggleSubject(subject.id, $event)"
              class="h-4 w-4"
            />
            <span>{{ getSubjectLabel(subject) }}</span>
          </label>
        </div>
        <p class="text-xs text-slate-500 mt-2">Selected: {{ form.subject_ids.length }}</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Academic Term (School Year + Semester) *</label>
        <select
          [(ngModel)]="form.academic_term_id"
          name="academicTermId"
          (ngModelChange)="onTermChange()"
          [disabled]="isLoadingTerms"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option [ngValue]="null">-- Select Academic Term --</option>
          <option *ngFor="let term of termOptions" [ngValue]="term.id">
            {{ getTermLabel(term) }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Semester *</label>
        <input
          type="text"
          [value]="form.semester"
          readonly
          class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">School Year *</label>
        <input
          type="text"
          [value]="form.school_year"
          readonly
          class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Status *</label>
        <select
          [(ngModel)]="form.status"
          name="status"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option value="">-- Select Status --</option>
          <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
        </select>
      </div>

      <div class="flex gap-2 pt-4">
        <button
          type="submit"
          [disabled]="isLoading"
          class="flex-1 bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50"
        >
          {{ isLoading ? 'Adding...' : 'Add Enrollment' }}
        </button>
        <button
          type="button"
          (click)="close()"
          class="flex-1 bg-slate-300 text-slate-900 font-medium py-2 rounded-lg hover:bg-slate-400"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
