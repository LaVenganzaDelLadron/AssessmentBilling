<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
    <h2 class="text-2xl font-bold text-slate-900 mb-4">Update Enrollment</h2>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="mb-4 p-3 bg-green-50 border border-green-200 rounded text-green-700 text-sm">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Student ID *</label>
        <input
          type="number"
          [(ngModel)]="form.student_id"
          name="studentId"
          placeholder="Enter student ID"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Subject ID *</label>
        <input
          type="number"
          [(ngModel)]="form.subject_id"
          name="subjectId"
          placeholder="Enter subject ID"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Academic Term ID *</label>
        <input
          type="number"
          [(ngModel)]="form.academic_term_id"
          name="academicTermId"
          placeholder="Enter academic term ID"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Semester *</label>
        <select
          [(ngModel)]="form.semester"
          name="semester"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option value="">-- Select Semester --</option>
          <option *ngFor="let semester of semesters" [value]="semester">{{ semester }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">School Year *</label>
        <input
          type="text"
          [(ngModel)]="form.school_year"
          name="schoolYear"
          placeholder="e.g., 2026-2027"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Status *</label>
        <select
          [(ngModel)]="form.status"
          name="status"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900"
        >
          <option value="">-- Select Status --</option>
          <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
        </select>
      </div>

      <div class="flex gap-2 pt-4">
        <button
          type="submit"
          [disabled]="isLoading"
          class="flex-1 bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50"
        >
          {{ isLoading ? 'Updating...' : 'Update Enrollment' }}
        </button>
        <button
          type="button"
          (click)="close()"
          class="flex-1 bg-slate-300 text-slate-900 font-medium py-2 rounded-lg hover:bg-slate-400"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
