<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full">
    <div class="flex justify-between items-center p-6 border-b border-slate-200">
      <h2 class="text-xl font-bold">Update Student</h2>
      <button (click)="close()" class="text-slate-500 hover:text-slate-700">×</button>
    </div>

    <form class="p-6 space-y-4">
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Student Number</label>
          <input [(ngModel)]="form.student_no" name="student_no" type="text" placeholder="Student Number" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
          <input [(ngModel)]="form.email" name="email" type="email" placeholder="Email" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">First Name</label>
          <input [(ngModel)]="form.first_name" name="first_name" type="text" placeholder="First Name" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Middle Name</label>
          <input [(ngModel)]="form.middle_name" name="middle_name" type="text" placeholder="Middle Name" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Last Name</label>
          <input [(ngModel)]="form.last_name" name="last_name" type="text" placeholder="Last Name" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Program ID</label>
          <input [(ngModel)]="form.program_id" name="program_id" type="number" placeholder="Program ID" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Year Level</label>
          <input [(ngModel)]="form.year_level" name="year_level" type="number" placeholder="Year Level" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Status</label>
          <select [(ngModel)]="form.status" name="status" class="w-full px-3 py-2 border border-slate-300 rounded hover:border-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
    </form>

    <div *ngIf="errorMessage" class="bg-red-50 text-red-700 p-3 mx-6 mb-4 rounded">
      {{ errorMessage }}
    </div>

    <div class="flex justify-end gap-3 p-6 border-t border-slate-200">
      <button (click)="close()" class="px-4 py-2 text-slate-700 border rounded hover:bg-slate-50">Cancel</button>
      <button (click)="submit()" [disabled]="isLoading" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50">
        {{ isLoading ? 'Loading...' : 'Update' }}
      </button>
    </div>
  </div>
</div>
