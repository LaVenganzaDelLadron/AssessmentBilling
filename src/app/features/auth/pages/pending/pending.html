<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity">

  <div class="relative w-full max-w-sm transform overflow-hidden rounded-[2rem] bg-white p-8 text-center shadow-2xl transition-all animate-in fade-in zoom-in duration-300">

    <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-blue-50">
      <div class="flex h-14 w-14 items-center justify-center rounded-full bg-blue-100 text-blue-600 shadow-inner">
        <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
    </div>

    <h3 class="text-2xl font-bold text-slate-900 tracking-tight">Request Sent</h3>
    <p class="mt-4 text-slate-500 leading-relaxed">
      Your account is currently in the "Glacial Freeze" state. Please <span class="font-bold text-blue-600">wait for admin approval</span> before you can access your dashboard.
    </p>

    <div class="mt-8">
      <button
        (click)="close()"
        class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl transition-all active:scale-95">
        Understood
      </button>
      <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-slate-300">
        Estimated wait: 24-48 Hours
      </p>
    </div>

    <button (click)="close()" class="absolute top-4 right-4 text-slate-300 hover:text-slate-500 transition-colors">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
    </button>
  </div>
</div>
