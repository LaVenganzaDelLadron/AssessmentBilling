<div class="min-h-screen bg-[#E0E7FF] flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 selection:bg-cyan-200">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[10%] -right-[5%] h-96 w-96 rounded-full bg-white/40 blur-[100px]"></div>
    <div class="absolute bottom-[5%] left-[5%] h-80 w-80 rounded-full bg-cyan-300/30 blur-3xl"></div>
    <div class="absolute top-1/4 left-10 h-32 w-32 bg-white/20 rotate-45 blur-sm rounded-lg border border-white/30"></div>
  </div>

  <div class="relative z-10 max-w-md w-full mx-auto">
    <div class="text-center mb-10">
      <div class="mx-auto h-16 w-16 bg-gradient-to-br from-cyan-100 to-blue-500 rounded-2xl flex items-center justify-center shadow-[0_10px_20px_rgba(0,0,0,0.1),inset_0_-4px_8px_rgba(0,0,0,0.1),inset_0_4px_8px_white] rotate-3 hover:rotate-0 transition-all duration-500 group">
        <svg class="h-8 w-8 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="mt-8 text-4xl font-black tracking-tighter text-blue-900 drop-shadow-sm">Frozen Access</h2>
      <p class="mt-3 text-blue-700/60 font-medium">
        Secure your education assets.
        <a href="#" class="text-blue-600 hover:text-cyan-500 font-bold underline decoration-blue-200 transition-all ml-1">Join the cold.</a>
      </p>
    </div>

    <div class="bg-white/60 backdrop-blur-2xl p-8 rounded-[2.5rem] border border-white/80 shadow-[0_20px_50px_rgba(148,163,184,0.15),0_1px_2px_rgba(255,255,255,0.8),inset_0_0_20px_white]">
      <form (ngSubmit)="onSubmit()" #loginNgForm="ngForm" class="space-y-6">

        <div class="space-y-2">
          <label for="identifier" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-800/50 ml-2">Identity Hub</label>
          <div class="relative">
            <input
              id="identifier"
              name="identifier"
              type="text"
              [(ngModel)]="loginForm.identifier"
              required
              class="block w-full px-5 py-4 bg-white/40 border border-white/60 rounded-2xl text-blue-900 placeholder-blue-300 focus:outline-none focus:ring-4 focus:ring-cyan-400/10 focus:border-cyan-400 focus:bg-white/80 transition-all shadow-inner"
              placeholder="Email or Student ID">
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center px-2">
            <label for="password" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-800/50">Password</label>
          </div>
          <div class="relative">
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="loginForm.password"
              required
              class="block w-full px-5 py-4 bg-white/40 border border-white/60 rounded-2xl text-blue-900 placeholder-blue-300 focus:outline-none focus:ring-4 focus:ring-cyan-400/10 focus:border-cyan-400 focus:bg-white/80 transition-all shadow-inner"
              placeholder="••••••••">
          </div>
        </div>

        <div class="flex items-center px-2 py-1">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-5 w-5 text-cyan-500 focus:ring-cyan-400 border-white/60 bg-white/40 rounded-lg cursor-pointer">
          <label for="remember-me" class="ml-3 block text-sm font-semibold text-blue-800/70">Keep my session frozen</label>
        </div>

        <div class="pt-4">
          <button
            type="submit"
            class="group w-full relative overflow-hidden flex justify-center items-center py-4 px-4 rounded-2xl bg-gradient-to-b from-cyan-400 to-blue-600 text-white font-black text-sm uppercase tracking-widest shadow-[0_10px_20px_rgba(6,182,212,0.3),inset_0_2px_4px_rgba(255,255,255,0.4)] transition-all hover:scale-[1.02] hover:shadow-cyan-300/50 active:scale-95">
            <span class="relative z-10">Login</span>
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-blue-100/50 text-center">
        <div class="flex justify-center gap-2 mb-4">
          <div class="h-1 w-8 rounded-full bg-cyan-200"></div>
          <div class="h-1 w-2 rounded-full bg-cyan-100"></div>
        </div>
        <p class="text-[11px] font-bold text-blue-400 uppercase tracking-tighter">
          Encryption Level: Arctic Zero <br/>
          <a href="#" class="text-cyan-600 hover:underline">Request Thermal Support</a>
        </p>
      </div>
    </div>
  </div>
</div>
