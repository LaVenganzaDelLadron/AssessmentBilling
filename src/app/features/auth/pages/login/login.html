<div class="min-h-screen bg-[#F8FAFC] flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  <div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#1e40af 1px, transparent 1px); background-size: 40px 40px;"></div>

  <div class="relative z-10 max-w-md w-full mx-auto">
    <div class="text-center mb-8">
      <div class="mx-auto h-14 w-14 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
        <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M12 14l9-5-9-5-9 5 9 5z" />
          <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
        </svg>
      </div>
      <h2 class="mt-6 text-3xl font-bold tracking-tight text-slate-900">Student Portal</h2>
      <p class="mt-2 text-sm text-slate-600">
        Enter your credentials to access your academic dashboard.
      </p>
    </div>

    <div class="bg-white border border-slate-200 shadow-xl shadow-slate-200/50 rounded-3xl p-8 sm:p-10">
      <form (ngSubmit)="onSubmit()" class="space-y-6">

        <div class="space-y-1.5">
          <label for="identifier" class="text-xs font-semibold text-slate-700 uppercase tracking-wider ml-1">Email</label>
          <div class="relative group">
            <input
              id="identifier"
              type="email"
              required
              [(ngModel)]="loginForm.identifier"
              name="identifier"
              class="block w-full px-4 py-3.5 ..."
              placeholder="e.g. john.doe@university.edu"
            />
          </div>
        </div>

        <div class="space-y-1.5">
          <div class="flex justify-between items-center px-1">
            <label for="password" class="text-xs font-semibold text-slate-700 uppercase tracking-wider">Password</label>
            <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-700 transition-colors">Forgot?</a>
          </div>
          <div class="relative group">
            <input
              id="password"
              type="password"
              required
              [(ngModel)]="loginForm.password"
              name="password"
              class="block w-full px-4 py-3.5 ..."
              placeholder="••••••••"
            />
          </div>
        </div>

        <div class="flex items-center px-1">
          <input id="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded cursor-pointer">
          <label for="remember-me" class="ml-2 block text-sm text-slate-600 font-medium">Keep me signed in</label>
        </div>

        <button
          type="submit"
          class="w-full flex justify-center py-3.5 px-4 rounded-xl bg-blue-600 text-white font-bold text-sm uppercase tracking-wide shadow-lg shadow-blue-200 hover:bg-blue-700 hover:shadow-blue-300 active:transform active:scale-[0.98] transition-all duration-200">
          Sign In
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <p class="text-sm text-slate-500">
          Need help? <a href="#" class="text-blue-600 font-semibold hover:underline">Contact IT Support</a>
        </p>
      </div>
    </div>

    <div class="mt-8 flex items-center justify-center space-x-4 opacity-50 grayscale hover:grayscale-0 transition-all duration-500">
       <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center">
         <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L9.03 9.03a2 2 0 001.94 0L17.834 4.9A2 2 0 0016 4.5H4a2 2 0 00-1.834.4zM1.5 8v5a2 2 0 002 2h13a2 2 0 002-2V8l-8 5-8-5z" clip-rule="evenodd"></path></svg>
         Official School System
       </span>
    </div>
  </div>
</div>
