<div class="p-8 max-w-4xl mx-auto">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-4xl font-bold text-slate-900">Teacher Profile</h1>
    <p class="text-slate-600 mt-2">{{ isEditing ? 'Edit your profile information' : 'View your profile information' }}</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-8">
    <p class="text-slate-600">Loading profile...</p>
  </div>

  <!-- Success Message -->
  <div *ngIf="successMessage" class="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg">
    <p class="text-green-700 font-medium">{{ successMessage }}</p>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
    <p class="text-red-700 font-medium">{{ errorMessage }}</p>
  </div>

  <!-- Profile Form -->
  <div *ngIf="profile && !isLoading" class="bg-white rounded-lg border border-slate-200 p-8">
    <form (ngSubmit)="saveProfile()">
      <!-- Personal Information -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold text-slate-900 mb-6">Personal Information</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- First Name -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">First Name *</label>
            <input
              type="text"
              [(ngModel)]="profile.first_name"
              name="firstName"
              [disabled]="!isEditing"
              required
              class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-900"
              [ngClass]="{ 'bg-slate-50': !isEditing, 'bg-white': isEditing }"
            />
          </div>

          <!-- Middle Name -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Middle Name</label>
            <input
              type="text"
              [(ngModel)]="profile.middle_name"
              name="middleName"
              [disabled]="!isEditing"
              class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-900"
              [ngClass]="{ 'bg-slate-50': !isEditing, 'bg-white': isEditing }"
            />
          </div>

          <!-- Last Name -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Last Name *</label>
            <input
              type="text"
              [(ngModel)]="profile.last_name"
              name="lastName"
              [disabled]="!isEditing"
              required
              class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-900"
              [ngClass]="{ 'bg-slate-50': !isEditing, 'bg-white': isEditing }"
            />
          </div>

          <!-- Teacher ID -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Teacher ID *</label>
            <input
              type="text"
              [(ngModel)]="profile.teacher_id"
              name="teacherId"
              [disabled]="!isEditing"
              required
              class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-900"
              [ngClass]="{ 'bg-slate-50': !isEditing, 'bg-white': isEditing }"
            />
          </div>
        </div>
      </div>

      <!-- Professional Information -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold text-slate-900 mb-6">Professional Information</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Department -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Department</label>
            <select
              [(ngModel)]="profile.department"
              name="department"
              [disabled]="!isEditing"
              class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-900"
              [ngClass]="{ 'bg-slate-50': !isEditing, 'bg-white': isEditing }"
            >
              <option value="">-- Select Department --</option>
              <option *ngFor="let dept of departments" [value]="dept">{{ dept }}</option>
            </select>
          </div>

          <!-- Status -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Status</label>
            <select
              [(ngModel)]="profile.status"
              name="status"
              [disabled]="!isEditing"
              class="w-full px-4 py-2 border border-slate-300 rounded-lg text-slate-900"
              [ngClass]="{ 'bg-slate-50': !isEditing, 'bg-white': isEditing }"
            >
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-4 pt-6 border-t border-slate-200">
        <button
          *ngIf="!isEditing"
          type="button"
          (click)="toggleEdit()"
          class="px-6 py-2 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 transition"
        >
          Edit Profile
        </button>

        <button
          *ngIf="isEditing"
          type="submit"
          [disabled]="isSaving"
          class="px-6 py-2 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 transition disabled:opacity-50"
        >
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>

        <button
          *ngIf="isEditing"
          type="button"
          (click)="cancel()"
          class="px-6 py-2 bg-slate-300 text-slate-900 font-medium rounded-lg hover:bg-slate-400 transition"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
