<div *ngIf="isOpen" class="teacher-modal-backdrop">
  <div class="teacher-modal teacher-modal--compact">
    <div class="teacher-modal__header">
      <div>
        <p class="teacher-modal__eyebrow">Teacher Breakdown</p>
        <h2>Delete Assessment Breakdown</h2>
      </div>
      <button type="button" (click)="close()">×</button>
    </div>

    <div class="teacher-modal__body">
      <p class="teacher-modal__copy">
        Delete <strong>{{ breakdown?.description }}</strong> from assessment
        <strong>#{{ breakdown?.assessment_id }}</strong>?
      </p>

      <div *ngIf="errorMessage" class="teacher-modal__error">{{ errorMessage }}</div>

      <div class="teacher-modal__actions">
        <button type="button" class="teacher-modal__secondary" (click)="close()">Cancel</button>
        <button type="button" class="teacher-modal__danger" (click)="confirm()">
          {{ isLoading ? 'Deleting...' : 'Delete Breakdown' }}
        </button>
      </div>
    </div>
  </div>
</div>
