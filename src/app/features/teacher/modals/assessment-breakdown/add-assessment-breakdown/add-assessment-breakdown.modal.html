<div *ngIf="isOpen" class="teacher-modal-backdrop">
  <div class="teacher-modal">
    <div class="teacher-modal__header">
      <div>
        <p class="teacher-modal__eyebrow">Teacher Breakdown</p>
        <h2>Add Assessment Breakdown</h2>
      </div>
      <button type="button" (click)="close()">×</button>
    </div>

    <form (ngSubmit)="submit()" class="teacher-modal__body">
      <div class="teacher-modal__grid">
        <label>
          <span>Assessment</span>
          <select [(ngModel)]="form.assessment_id" name="assessment_id" (ngModelChange)="onAssessmentChange()">
            <option [ngValue]="null">Select assessment</option>
            <option *ngFor="let assessment of assessments" [ngValue]="assessment.id">
              #{{ assessment.id }} • {{ assessment.student_name || ('Student #' + assessment.student_id) }} • {{ assessment.school_year }}
            </option>
          </select>
        </label>

        <label>
          <span>Source Type</span>
          <select [(ngModel)]="form.source_type" name="source_type" (ngModelChange)="onSourceTypeChange()">
            <option *ngFor="let sourceType of sourceTypes" [value]="sourceType">{{ sourceType }}</option>
          </select>
        </label>
      </div>

      <div *ngIf="isSubjectMode" class="teacher-modal__grid">
        <label>
          <span>Subject Source</span>
          <select [(ngModel)]="form.source_id" name="source_id" (ngModelChange)="onSubjectChange()">
            <option [ngValue]="null">Select subject</option>
            <option *ngFor="let subject of subjects" [ngValue]="subject.id">
              {{ subject.code }} • {{ subject.name }}
            </option>
          </select>
        </label>
      </div>

      <div *ngIf="!isSubjectMode" class="teacher-modal__grid">
        <label>
          <span>Source ID</span>
          <input [(ngModel)]="form.source_id" name="manual_source_id" type="text">
        </label>
      </div>

      <div class="teacher-modal__grid">
        <label class="teacher-modal__grid-column">
          <span>Description</span>
          <textarea [(ngModel)]="form.description" name="description"></textarea>
        </label>
      </div>

      <div class="teacher-modal__grid teacher-modal__grid--three">
        <label>
          <span>Units</span>
          <input [(ngModel)]="form.units" name="units" type="number" min="0" step="0.01" (ngModelChange)="onAmountInputsChange()">
        </label>
        <label>
          <span>Rate</span>
          <input [(ngModel)]="form.rate" name="rate" type="number" min="0" step="0.01" (ngModelChange)="onAmountInputsChange()">
        </label>
        <label>
          <span>Amount</span>
          <input [(ngModel)]="form.amount" name="amount" type="number" min="0" step="0.01">
        </label>
      </div>

      <div *ngIf="errorMessage" class="teacher-modal__error">{{ errorMessage }}</div>

      <div class="teacher-modal__actions">
        <button type="button" class="teacher-modal__secondary" (click)="close()">Cancel</button>
        <button type="submit" [disabled]="isLoading || isLoadingReferenceData">
          {{ isLoading ? 'Saving...' : 'Create Breakdown' }}
        </button>
      </div>
    </form>
  </div>
</div>
