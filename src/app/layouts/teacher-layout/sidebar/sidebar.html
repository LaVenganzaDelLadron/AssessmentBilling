<aside class="w-64 bg-gradient-to-b from-green-900 to-green-800 min-h-screen text-white shadow-2xl">
  <!-- Logo Section -->
  <div class="p-6 border-b border-green-700">
    <div class="flex items-center space-x-3">
      <div class="h-10 w-10 bg-green-500 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-white">Teacher Portal</h1>
        <p class="text-xs text-green-300">Limited Access</p>
      </div>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="p-6 space-y-2 overflow-y-auto max-h-[calc(100vh-200px)]">
    <a routerLink="/teacher/dashboard" routerLinkActive="bg-green-600 text-white" [routerLinkActiveOptions]="{exact: true}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-green-100 font-medium transition-all hover:bg-green-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 11l4-4m0 0l4 4m-4-4V3" />
      </svg>
      <span>Dashboard</span>
    </a>

    <div class="text-xs font-bold uppercase tracking-widest text-green-400 px-4 py-2 mt-4">Teaching</div>

    <a routerLink="/teacher/subjects" routerLinkActive="bg-green-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-green-100 font-medium transition-all hover:bg-green-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
      <span>My Subjects</span>
    </a>

    <a routerLink="/teacher/enrollments" routerLinkActive="bg-green-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-green-100 font-medium transition-all hover:bg-green-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-2a6 6 0 0112 0v2zm0 0h6v-2a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <span>Enrollments</span>
    </a>

    <a routerLink="/teacher/assessments" routerLinkActive="bg-green-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-green-100 font-medium transition-all hover:bg-green-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
      </svg>
      <span>Assessments</span>
    </a>

    <div class="text-xs font-bold uppercase tracking-widest text-green-400 px-4 py-2 mt-4">Account</div>

    <a routerLink="/teacher/profile" routerLinkActive="bg-green-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-green-100 font-medium transition-all hover:bg-green-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      <span>Profile</span>
    </a>
  </nav>

  <!-- Divider -->
  <div class="px-6 my-4">
    <div class="border-t border-green-700"></div>
  </div>

  <!-- Footer Section -->
  <div class="px-6 pb-6">
    <div class="bg-green-700 rounded-lg p-4 space-y-3">
      <div class="flex items-center space-x-3">
        <div class="h-10 w-10 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex-shrink-0"></div>
        <div>
          <p class="text-sm font-semibold text-white">Teacher</p>
          <p class="text-xs text-green-300">teacher@university.edu</p>
        </div>
      </div>
      <button class="w-full text-left px-3 py-2 text-sm text-green-100 hover:text-white hover:bg-green-600 rounded transition-all">
        Logout
      </button>
    </div>
  </div>
</aside>
