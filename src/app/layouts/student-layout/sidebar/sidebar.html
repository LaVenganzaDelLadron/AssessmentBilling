<aside class="w-64 bg-gradient-to-b from-indigo-900 to-indigo-800 min-h-screen text-white shadow-2xl">
  <!-- Logo Section -->
  <div class="p-6 border-b border-indigo-700">
    <div class="flex items-center space-x-3">
      <div class="h-10 w-10 bg-indigo-500 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-2a6 6 0 0112 0v2zm0 0h6v-2a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-white">Student Portal</h1>
        <p class="text-xs text-indigo-300">My Account</p>
      </div>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="p-6 space-y-2 overflow-y-auto max-h-[calc(100vh-200px)]">
    <a routerLink="/student/dashboard" routerLinkActive="bg-indigo-600 text-white" [routerLinkActiveOptions]="{exact: true}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-indigo-100 font-medium transition-all hover:bg-indigo-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 11l4-4m0 0l4 4m-4-4V3" />
      </svg>
      <span>Dashboard</span>
    </a>

    <div class="text-xs font-bold uppercase tracking-widest text-indigo-400 px-4 py-2 mt-4">Account</div>

    <a routerLink="/student/profile" routerLinkActive="bg-indigo-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-indigo-100 font-medium transition-all hover:bg-indigo-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      <span>My Profile</span>
    </a>

    <a routerLink="/student/enrollments" routerLinkActive="bg-indigo-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-indigo-100 font-medium transition-all hover:bg-indigo-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
      <span>My Enrollments</span>
    </a>

    <div class="text-xs font-bold uppercase tracking-widest text-indigo-400 px-4 py-2 mt-4">Billing</div>

    <a routerLink="/student/invoices" routerLinkActive="bg-indigo-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-indigo-100 font-medium transition-all hover:bg-indigo-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      <span>My Invoices</span>
    </a>

    <a routerLink="/student/receipts" routerLinkActive="bg-indigo-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-indigo-100 font-medium transition-all hover:bg-indigo-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
      </svg>
      <span>My Receipts</span>
    </a>

    <a routerLink="/student/payments" routerLinkActive="bg-indigo-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-indigo-100 font-medium transition-all hover:bg-indigo-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h.01M11 15h.01M15 15h.01M6 3h12a3 3 0 013 3v12a3 3 0 01-3 3H6a3 3 0 01-3-3V6a3 3 0 013-3z" />
      </svg>
      <span>My Payments</span>
    </a>

    <a routerLink="/student/payment-methods" routerLinkActive="bg-indigo-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-indigo-100 font-medium transition-all hover:bg-indigo-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h.01M11 15h.01M15 15h.01M6 3h12a3 3 0 013 3v12a3 3 0 01-3 3H6a3 3 0 01-3-3V6a3 3 0 013-3z" />
      </svg>
      <span>Payment Methods</span>
    </a>
  </nav>

  <!-- Divider -->
  <div class="px-6 my-4">
    <div class="border-t border-indigo-700"></div>
  </div>

  <!-- Footer Section -->
  <div class="px-6 pb-6">
    <div class="bg-indigo-700 rounded-lg p-4 space-y-3">
      <div class="flex items-center space-x-3">
        <div class="h-10 w-10 bg-gradient-to-br from-indigo-400 to-indigo-600 rounded-full flex-shrink-0"></div>
        <div>
          <p class="text-sm font-semibold text-white">Student</p>
          <p class="text-xs text-indigo-300">student@university.edu</p>
        </div>
      </div>
      <button class="w-full text-left px-3 py-2 text-sm text-indigo-100 hover:text-white hover:bg-indigo-600 rounded transition-all">
        Logout
      </button>
    </div>
  </div>
</aside>
