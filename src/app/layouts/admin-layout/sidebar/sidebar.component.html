<aside class="w-64 bg-gradient-to-b from-slate-900 to-slate-800 min-h-screen text-white shadow-2xl">
  <!-- Logo Section -->
  <div class="p-6 border-b border-slate-700">
    <div class="flex items-center space-x-3">
      <div class="h-10 w-10 bg-blue-500 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-white">Dashboard</h1>
        <p class="text-xs text-slate-400">Admin Panel</p>
      </div>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav class="p-6 space-y-2">
    <a routerLink="/admin/dashboard" routerLinkActive="bg-blue-600 text-white" [routerLinkActiveOptions]="{exact: true}" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 11l4-4m0 0l4 4m-4-4V3" />
      </svg>
      <span>Dashboard</span>
    </a>

    <a routerLink="/admin/student" routerLinkActive="bg-blue-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-2a6 6 0 0112 0v2zm0 0h6v-2a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <span>Students</span>
    </a>

    <a routerLink="/admin/assessment" routerLinkActive="bg-blue-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
      </svg>
      <span>Assessments</span>
    </a>

    <a routerLink="/admin/enrollment" routerLinkActive="bg-blue-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
      </svg>
      <span>Enrollments</span>
    </a>

    <a routerLink="/admin/invoices" routerLinkActive="bg-blue-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      <span>Invoices</span>
    </a>

    <a routerLink="/admin/payment" routerLinkActive="bg-blue-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span>Payments</span>
    </a>

    <a routerLink="/admin/report" routerLinkActive="bg-blue-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
      <span>Reports</span>
    </a>

    <a routerLink="/admin/settings" routerLinkActive="bg-blue-600 text-white" class="flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-300 font-medium transition-all hover:bg-slate-700 hover:text-white">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.26 2.632 1.732-.44.901.083 2.08.876 2.539.754.509 1.42 1.393.88 2.54-.539 1.145-1.994.898-2.738.88a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-.744.018-2.199.265-2.738-.88-.54-1.147.126-2.031.88-2.54.793-.458 1.316-1.638.876-2.539-.788-1.472.089-2.672 1.632-1.732.658-.337 1.72-.235 2.573-1.066z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span>Settings</span>
    </a>
  </nav>

  <!-- Divider -->
  <div class="px-6 my-4">
    <div class="border-t border-slate-700"></div>
  </div>

  <!-- Footer Section -->
  <div class="px-6 pb-6">
    <div class="bg-slate-700 rounded-lg p-4 space-y-3">
      <div class="flex items-center space-x-3">
        <div class="h-10 w-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-full flex-shrink-0"></div>
        <div>
          <p class="text-sm font-semibold text-white">Admin User</p>
          <p class="text-xs text-slate-400">admin@university.edu</p>
        </div>
      </div>
      <button class="w-full text-left px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-600 rounded transition-all">
        Logout
      </button>
    </div>
  </div>
</aside>
