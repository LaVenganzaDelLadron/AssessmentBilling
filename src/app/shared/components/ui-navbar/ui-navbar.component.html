<header class="sticky top-0 z-30 bg-white shadow-sm">
  <div class="flex items-center justify-between px-4 py-3 sm:px-6">
    <div class="flex items-center gap-3">
      <button
        type="button"
        class="inline-flex h-9 w-9 items-center justify-center rounded-md text-gray-600 hover:bg-gray-100 lg:hidden"
        (click)="menuClick.emit()"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M3 12h18M3 18h18" />
        </svg>
      </button>
      <h1 class="text-lg font-semibold text-gray-900 sm:text-xl">{{ title }}</h1>
    </div>

    <div class="flex items-center gap-3">
      <ng-content select="[navbar-actions]"></ng-content>
      <p class="hidden text-sm font-medium text-gray-700 sm:block">{{ userName }}</p>
      <button
        *ngIf="showLogout"
        type="button"
        class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-indigo-700"
        (click)="logoutClick.emit()"
      >
        Logout
      </button>
    </div>
  </div>
</header>
