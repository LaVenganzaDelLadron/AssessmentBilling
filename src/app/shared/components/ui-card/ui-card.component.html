<article
  class="group relative overflow-hidden rounded-3xl bg-white p-6
         /* Base Stroke: Uses a very subtle ring */
         ring-1 ring-slate-200/60 shadow-sm

         /* Interaction Wrapper: Smooth transitions */
         transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1)

         /* Hover State: The 'Lift' and the 'Stroke' change */
         hover:-translate-y-2 hover:shadow-[0_20px_50px_rgba(79,70,229,0.1)]
         hover:ring-2 hover:ring-indigo-500"
>
  <div class="absolute inset-0 z-0 p-[2px] opacity-0 transition-opacity duration-500 group-hover:opacity-100">
    <div class="h-full w-full rounded-[22px] bg-gradient-to-br from-indigo-500 via-purple-500 to-emerald-400 opacity-20 blur-sm"></div>
  </div>

  <div class="absolute -right-10 -top-10 h-32 w-32 rounded-full bg-indigo-500/5 blur-3xl transition-all duration-700 group-hover:bg-indigo-500/10 group-hover:scale-150"></div>

  <div class="relative z-10 flex items-start justify-between gap-6">
    <div class="space-y-1">
      <p *ngIf="title" class="text-[11px] font-black uppercase tracking-[0.15em] text-slate-400 group-hover:text-indigo-600 transition-colors">
        {{ title }}
      </p>

      <p *ngIf="value" class="text-3xl font-[900] tracking-tight text-slate-900">
        {{ value }}
      </p>

      <p *ngIf="subtitle" class="text-sm font-medium leading-relaxed text-slate-500/80">
        {{ subtitle }}
      </p>
    </div>

    <div class="shrink-0 flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-50 text-slate-600
                transition-all duration-500
                group-hover:bg-indigo-600 group-hover:text-white group-hover:shadow-lg group-hover:shadow-indigo-200 group-hover:-rotate-6 group-hover:scale-110">
      <ng-content select="[card-icon]"></ng-content>
    </div>
  </div>

  <div class="relative z-10 mt-6 pt-4 border-t border-slate-50/80">
    <ng-content></ng-content>
  </div>
</article>
