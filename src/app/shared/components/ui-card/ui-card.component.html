<article class="rounded-xl bg-white p-5 shadow-sm">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p *ngIf="title" class="text-sm font-medium text-gray-600">{{ title }}</p>
      <p *ngIf="value" class="mt-1 text-2xl font-semibold text-gray-900">{{ value }}</p>
      <p *ngIf="subtitle" class="mt-1 text-xs text-gray-500">{{ subtitle }}</p>
    </div>
    <div class="shrink-0">
      <ng-content select="[card-icon]"></ng-content>
    </div>
  </div>
  <div class="mt-4">
    <ng-content></ng-content>
  </div>
</article>
