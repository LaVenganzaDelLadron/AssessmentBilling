<article
  class="group relative overflow-hidden rounded-2xl bg-white p-6
         ring-1 ring-slate-200/60 shadow-sm transition-all duration-300 ease-out
         hover:-translate-y-1 hover:shadow-xl hover:shadow-indigo-500/10 hover:ring-indigo-500/20"
>
  <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/[0.02] to-transparent opacity-0 transition-opacity group-hover:opacity-100"></div>

  <div class="relative flex items-start justify-between gap-6">
    <div class="space-y-1">
      <p *ngIf="title" class="text-[11px] font-bold uppercase tracking-wider text-slate-500/90">
        {{ title }}
      </p>

      <p *ngIf="value" class="text-3xl font-extrabold tracking-tight text-slate-900">
        {{ value }}
      </p>

      <p *ngIf="subtitle" class="text-sm font-medium leading-relaxed text-slate-500">
        {{ subtitle }}
      </p>
    </div>

    <div class="shrink-0 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-3">
      <ng-content select="[card-icon]"></ng-content>
    </div>
  </div>

  <div class="relative mt-6 pt-4 border-t border-slate-50">
    <ng-content></ng-content>
  </div>
</article>
