<div class="overflow-x-auto rounded-xl bg-white shadow-sm">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th
          *ngFor="let column of columns"
          class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-500"
        >
          {{ column.label }}
        </th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100 bg-white">
      <tr *ngFor="let row of rows">
        <td *ngFor="let column of columns" class="whitespace-nowrap px-4 py-3 text-sm text-gray-700">
          {{ row[column.key] }}
        </td>
      </tr>
      <tr *ngIf="rows.length === 0">
        <td [attr.colspan]="columns.length || 1" class="px-4 py-6 text-center text-sm text-gray-500">
          No data available
        </td>
      </tr>
    </tbody>
  </table>
</div>
