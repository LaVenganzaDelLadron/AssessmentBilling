<button
  [type]="type"
  [disabled]="disabled"
  (click)="onPress()"
  class="inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm font-medium transition focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
  [class.w-full]="fullWidth"
  [ngClass]="{
    'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-600': variant === 'primary',
    'border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 focus:ring-gray-400': variant === 'secondary',
    'bg-transparent text-gray-700 hover:bg-gray-100 focus:ring-gray-400': variant === 'ghost',
    'bg-red-600 text-white hover:bg-red-700 focus:ring-red-600': variant === 'danger'
  }"
>
  <span>{{ label }}</span>
</button>
