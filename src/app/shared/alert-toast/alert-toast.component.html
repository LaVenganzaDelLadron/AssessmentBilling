<section class="pointer-events-none fixed right-4 top-4 z-[1000] flex w-[min(92vw,24rem)] flex-col gap-3 sm:right-6 sm:top-6">
  <article
    *ngFor="let toast of toasts(); trackBy: trackById"
    class="pointer-events-auto rounded-xl border bg-white p-4 shadow-md ring-1 ring-black/5"
    [ngClass]="{
      'border-green-200': toast.type === 'success',
      'border-amber-200': toast.type === 'warning',
      'border-red-200': toast.type === 'error',
      'border-blue-200': toast.type === 'info'
    }"
  >
    <div class="flex items-start justify-between gap-3">
      <div>
        <p
          class="text-sm font-semibold"
          [ngClass]="{
            'text-green-700': toast.type === 'success',
            'text-amber-700': toast.type === 'warning',
            'text-red-700': toast.type === 'error',
            'text-blue-700': toast.type === 'info'
          }"
        >
          {{ toast.title || (toast.type | titlecase) }}
        </p>
        <p class="mt-1 text-sm text-gray-700">{{ toast.message }}</p>
      </div>
      <button
        type="button"
        class="rounded-md p-1 text-gray-400 transition hover:bg-gray-100 hover:text-gray-600"
        (click)="alertService.dismiss(toast.id)"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
  </article>
</section>
